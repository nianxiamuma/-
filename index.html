<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说取名模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0d0f1a;
  color: #e0e0e0;
  min-height: 100vh;
}
.app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
header { text-align: center; padding: 24px 0 16px; }
header h1 {
  font-size: 2rem;
  background: linear-gradient(135deg, #f0c27f, #fc5c7d, #6a82fb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; font-weight: 800; letter-spacing: 2px;
}
header p { color: #888; margin-top: 6px; font-size: 0.9rem; }
.tab-bar {
  display: flex; background: #16182a; border-radius: 12px;
  border: 1px solid #2a2d4a; overflow: hidden; margin: 16px 0 24px;
}
.tab-btn {
  flex: 1; padding: 14px 20px; border: none; background: transparent;
  color: #888; font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: all .2s; font-family: inherit; position: relative;
}
.tab-btn:hover { color: #ccc; background: #1e2038; }
.tab-btn.active { color: #fff; background: linear-gradient(135deg, #6a82fb22, #fc5c7d22); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 2px;
  background: linear-gradient(90deg, #6a82fb, #fc5c7d); border-radius: 1px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.main-layout { display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
@media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }
.sidebar {
  background: #16182a; border-radius: 16px; padding: 20px 16px;
  border: 1px solid #2a2d4a; height: fit-content;
}
.sidebar-section { margin-bottom: 20px; }
.sidebar-section:last-child { margin-bottom: 0; }
.sidebar-label {
  font-size: 0.75rem; color: #888; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px; font-weight: 600;
}
.btn-group { display: flex; flex-direction: column; gap: 6px; }
.btn-group-h { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-opt {
  padding: 8px 14px; border-radius: 8px; border: 1px solid #2a2d4a;
  background: #1e2038; color: #bbb; cursor: pointer; font-size: 0.85rem;
  transition: all .2s; text-align: left; font-family: inherit;
}
.btn-opt:hover { background: #2a2d5a; color: #fff; }
.btn-opt.active { background: linear-gradient(135deg,#6a82fb33,#fc5c7d33); border-color: #6a82fb; color: #fff; }
.btn-opt.small { padding: 6px 14px; font-size: 0.8rem; text-align: center; flex:1; }
.content {
  background: #16182a; border-radius: 16px; border: 1px solid #2a2d4a;
  padding: 28px; min-height: 400px;
}
.content-top {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
}
.content-top .info { font-size: 0.9rem; color: #aaa; }
.content-top .info span { color: #f0c27f; font-weight: 600; }
.btn-gen {
  padding: 12px 36px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #6a82fb, #fc5c7d);
  color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: transform .15s, box-shadow .15s; font-family: inherit; letter-spacing: 1px;
}
.btn-gen:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #6a82fb44; }
.btn-gen:active { transform: translateY(0); }
.btn-gen.small { padding: 8px 16px; font-size: 0.8rem; }
.btn-gen.ghost {
  background: transparent; border: 1px solid #2a2d4a; color: #aaa;
}
.btn-gen.ghost:hover { background: #2a2d5a; color: #fff; box-shadow: none; }
.controls-row {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  margin-bottom: 24px; padding: 16px; background: #1a1c32; border-radius: 12px;
}
.controls-row label { font-size: 0.85rem; color: #aaa; display: flex; align-items: center; gap: 8px; }
.controls-row select, .controls-row input {
  background: #0d0f1a; border: 1px solid #2a2d4a; color: #e0e0e0;
  padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; font-family: inherit;
}
.controls-row select option { background: #1a1c32; }
.controls-row input[type=checkbox] { accent-color: #6a82fb; width: 16px; height: 16px; }
.name-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.name-card {
  background: #1a1c32; border: 1px solid #2a2d4a; border-radius: 10px;
  padding: 14px 16px; transition: all .2s; position: relative;
  user-select: none; display: flex; flex-direction: column;
}
.name-card:hover { border-color: #6a82fb; background: #22244a; }
.name-card .name { font-size: 1.1rem; font-weight: 600; color: #fff; }
.name-card .desc { font-size: 0.75rem; color: #888; margin-top: 4px; }
.name-card .card-actions {
  display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end;
  opacity: 0; transition: opacity .2s;
}
.name-card:hover .card-actions { opacity: 1; }
.card-actions .btn-sm {
  padding: 4px 12px; border-radius: 6px; border: 1px solid #2a2d4a;
  background: #0d0f1a; color: #aaa; cursor: pointer; font-size: 0.75rem;
  font-family: inherit; transition: all .15s;
}
.card-actions .btn-sm:hover { background: #2a2d5a; color: #fff; border-color: #6a82fb; }
.card-actions .btn-sm.highlight { border-color: #f0c27f66; color: #f0c27f; }
.name-card.saved { border-color: #4ade8066; background: #1a2a2a; }
.empty-state { text-align: center; padding: 40px 20px; color: #666; }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.95rem; }
.empty-state .btn-gen { margin-top: 16px; }
.lib-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
}
.lib-title { font-size: 1.3rem; font-weight: 700; color: #fff; }
.lib-title span { color: #f0c27f; }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.book-card {
  background: linear-gradient(145deg, #1a1c32, #1e2038);
  border: 1px solid #2a2d4a; border-radius: 14px; padding: 22px 20px;
  cursor: pointer; transition: all .25s; position: relative; overflow: hidden;
}
.book-card:hover { border-color: #6a82fb; transform: translateY(-3px); box-shadow: 0 8px 24px #00000044; }
.book-card .book-icon { font-size: 2rem; margin-bottom: 12px; }
.book-card .book-title { font-size: 1.15rem; font-weight: 700; color: #fff; }
.book-card .book-meta { font-size: 0.8rem; color: #888; margin-top: 6px; }
.book-card .book-desc {
  font-size: 0.82rem; color: #999; margin-top: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.book-card .book-count {
  position: absolute; top: 16px; right: 16px;
  background: #6a82fb33; color: #6a82fb; font-size: 0.75rem;
  padding: 2px 10px; border-radius: 20px; font-weight: 600;
}
.book-card .delete-book {
  position: absolute; bottom: 16px; right: 16px;
  background: none; border: none; color: #555; cursor: pointer;
  font-size: 0.75rem; padding: 4px 8px; border-radius: 6px;
  transition: all .15s; font-family: inherit;
}
.book-card .delete-book:hover { color: #fc5c7d; background: #fc5c7d22; }
.back-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn {
  background: none; border: 1px solid #2a2d4a; color: #aaa;
  padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  transition: all .15s; font-family: inherit;
}
.back-btn:hover { background: #2a2d5a; color: #fff; }
.book-info-card {
  background: #1a1c32; border: 1px solid #2a2d4a; border-radius: 12px;
  padding: 20px 24px; margin-bottom: 24px;
}
.book-info-card h2 { font-size: 1.2rem; color: #fff; margin-bottom: 6px; }
.book-info-card .sub { font-size: 0.85rem; color: #888; }
.char-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
}
.char-header h3 { font-size: 1rem; color: #ddd; }
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.char-card {
  background: #1a1c32; border: 1px solid #2a2d4a; border-radius: 12px;
  padding: 18px 20px; transition: all .15s;
}
.char-card:hover { border-color: #6a82fb44; }
.char-card .char-name { font-size: 1.1rem; font-weight: 600; color: #fff; }
.char-card .char-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.char-card .char-tag {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
  background: #2a2d4a; color: #aaa;
}
.char-card .char-section { margin-top: 10px; }
.char-card .char-section-label {
  font-size: 0.7rem; color: #888; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px; font-weight: 600;
}
.char-card .char-explain {
  padding: 10px 12px; background: #16182a;
  border-radius: 8px; border: 1px solid #2a2d4a22;
  font-size: 0.82rem; color: #bbb; line-height: 1.6;
}
.char-card .char-remark {
  padding: 8px 12px; background: #16182a;
  border-radius: 8px; border: 1px dashed #2a2d4a44;
  font-size: 0.8rem; color: #999; line-height: 1.5;
  font-style: italic;
}
.char-card .char-actions {
  display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end;
}
.char-card .char-actions .btn-sm {
  padding: 3px 10px; font-size: 0.7rem; border-radius: 6px;
  border: 1px solid #2a2d4a; background: #0d0f1a; color: #aaa;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.char-card .char-actions .btn-sm:hover { background: #2a2d5a; color: #fff; border-color: #6a82fb; }
.char-card .delete-char:hover { border-color: #fc5c7d66 !important; color: #fc5c7d !important; }
.modal-overlay {
  position: fixed; inset: 0; background: #00000088;
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
}
.modal {
  background: #1e2038; border: 1px solid #2a2d4a; border-radius: 16px;
  padding: 28px; max-width: 560px; width: 100%; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 24px 64px #00000066;
}
.modal h3 { font-size: 1.1rem; color: #fff; margin-bottom: 20px; }
.modal label { font-size: 0.85rem; color: #bbb; display: block; margin-bottom: 6px; }
.modal input, .modal textarea, .modal select {
  width: 100%; background: #0d0f1a; border: 1px solid #2a2d4a; color: #e0e0e0;
  padding: 10px 12px; border-radius: 8px; font-size: 0.9rem;
  font-family: inherit; margin-bottom: 16px; box-sizing: border-box;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: #6a82fb; }
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px;
}
.modal-actions .btn-gen { padding: 10px 24px; font-size: 0.9rem; }
.modal-actions .btn-cancel {
  padding: 10px 24px; border: 1px solid #2a2d4a; border-radius: 12px;
  background: transparent; color: #aaa; cursor: pointer; font-size: 0.9rem;
  font-family: inherit; transition: all .15s;
}
.modal-actions .btn-cancel:hover { background: #2a2d5a; color: #fff; }
.explain-box {
  background: #0d0f1a; border: 1px solid #2a2d4a; border-radius: 10px;
  padding: 16px; margin-bottom: 16px; font-size: 0.88rem;
  color: #ccc; line-height: 1.7; max-height: 200px; overflow-y: auto;
}
.explain-box .exp-category {
  display: inline-block; font-size: 0.7rem; padding: 2px 10px;
  border-radius: 4px; background: #6a82fb22; color: #6a82fb;
  margin-bottom: 8px; font-weight: 600;
}
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e2038; border: 1px solid #2a2d4a;
  padding: 12px 24px; border-radius: 10px; font-size: 0.85rem;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.rem-textarea {
  width: 100%; background: #0d0f1a; border: 1px solid #2a2d4a; color: #e0e0e0;
  padding: 10px 12px; border-radius: 8px; font-size: 0.85rem;
  font-family: inherit; margin-bottom: 16px; min-height: 60px; resize: vertical;
  box-sizing: border-box;
}
.rem-textarea:focus { outline: none; border-color: #f0c27f; }
.btn-sm.remark-btn { border-color: #f0c27f44 !important; color: #f0c27f !important; }
.btn-sm.remark-btn:hover { border-color: #f0c27f !important; background: #f0c27f22 !important; }
.explain-info {
  font-size: 0.75rem; color: #666; margin-top: 4px; text-align: center;
}
/* Phase 1: Blacklist & Daily Fortune */
.name-card .blacklist-btn {
  position: absolute; top: 8px; right: 40px;
  background: none; border: none; color: #555; cursor: pointer;
  font-size: 0.85rem; padding: 2px 6px; border-radius: 4px;
  opacity: 0; transition: all .15s;
}
.name-card:hover .blacklist-btn { opacity: 1; }
.name-card:hover .blacklist-btn:hover { color: #fc5c7d; background: #fc5c7d22; }
.name-card.blacklisted { opacity: 0.4; }
.daily-fortune {
  background: linear-gradient(135deg, #1a1c32, #22244a);
  border: 1px solid #f0c27f33; border-radius: 10px;
  padding: 12px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.daily-fortune .fortune-icon { font-size: 1.5rem; }
.daily-fortune .fortune-text { flex: 1; }
.daily-fortune .fortune-name { font-weight: 700; color: #f0c27f; font-size: 1.05rem; }
.daily-fortune .fortune-desc { font-size: 0.78rem; color: #999; margin-top: 2px; }
.bl-mgmt-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: #2a2d4a; color: #aaa; font-size: 0.75rem;
  padding: 4px 10px; border-radius: 6px; cursor: pointer;
  transition: all .15s; border: 1px solid transparent;
}
.bl-mgmt-chip:hover { color: #fc5c7d; border-color: #fc5c7d44; }
.bl-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: #1a1c32; border-radius: 6px;
  margin-bottom: 6px;
}
.bl-item .bl-name { font-size: 0.9rem; color: #ddd; }
.bl-item .bl-remove {
  background: none; border: none; color: #555; cursor: pointer;
  font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; transition: all .15s;
}
.bl-item .bl-remove:hover { color: #fc5c7d; background: #fc5c7d22; }
/* Phase 2: Filter section */
.filter-section { margin-bottom: 16px; }
.filter-section .sidebar-label { margin-bottom: 8px; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.filter-chip {
  padding: 5px 10px; border-radius: 6px; border: 1px solid #2a2d4a;
  background: #1e2038; color: #999; cursor: pointer; font-size: 0.75rem;
  transition: all .15s; font-family: inherit;
}
.filter-chip:hover { background: #2a2d5a; color: #ccc; }
.filter-chip.active { background: #6a82fb22; border-color: #6a82fb; color: #6a82fb; }
.mode-switch {
  display: flex; background: #1a1c32; border-radius: 8px;
  border: 1px solid #2a2d4a; overflow: hidden; margin-top: 12px;
}
.mode-switch .mode-btn {
  flex: 1; padding: 8px 12px; border: none; background: transparent;
  color: #888; cursor: pointer; font-size: 0.8rem; font-family: inherit;
  transition: all .15s;
}
.mode-switch .mode-btn.active { background: #6a82fb22; color: #fff; }
.batch-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; background: #1a1c32; border-radius: 8px;
  margin-top: 12px; border: 1px solid #2a2d4a;
}
.name-card .batch-check {
  position: absolute; top: 10px; left: 10px;
  width: 18px; height: 18px; accent-color: #6a82fb; display: none;
}
.name-card.batch-mode { padding-left: 36px; }
.name-card.batch-mode .batch-check { display: block; }
.name-card.batch-selected { border-color: #6a82fb88; background: #22245a; }
/* Phase 3: Profile card */
.profile-field {
  margin-bottom: 12px;
}
.profile-field label {
  font-size: 0.8rem; color: #888; display: block; margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.profile-field input, .profile-field textarea {
  width: 100%; background: #0d0f1a; border: 1px solid #2a2d4a;
  color: #e0e0e0; padding: 8px 10px; border-radius: 6px;
  font-size: 0.85rem; font-family: inherit; box-sizing: border-box;
}
.profile-field textarea { min-height: 50px; resize: vertical; }
.profile-display {
  background: #16182a; border: 1px solid #2a2d4a; border-radius: 10px;
  padding: 20px; margin-bottom: 16px;
}
.profile-display .pf-name { font-size: 1.2rem; color: #fff; font-weight: 700; margin-bottom: 12px; }
.profile-display .pf-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 10px; }
.profile-display .pf-item { flex: 1; min-width: 120px; }
.profile-display .pf-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.profile-display .pf-value { font-size: 0.88rem; color: #ccc; line-height: 1.5; }
/* Phase 3: Relationship graph */
.graph-container {
  position: relative; background: #0d0f1a; border: 1px solid #2a2d4a;
  border-radius: 12px; overflow: hidden; margin-bottom: 16px;
}
.graph-container canvas { display: block; cursor: default; }
.graph-legend {
  display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 16px;
  background: #1a1c32; border-radius: 8px; margin-top: 12px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #aaa; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend-line { width: 20px; height: 2px; border-radius: 1px; }
.rel-modal-chars {
  display: flex; gap: 16px; align-items: center; justify-content: center;
  margin-bottom: 16px; font-size: 1rem; color: #fff;
}
.rel-modal-chars .rel-arrow { color: #6a82fb; font-size: 1.2rem; }
.rel-type-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 16px;
}
.rel-type-btn {
  padding: 8px; border-radius: 8px; border: 1px solid #2a2d4a;
  background: #1e2038; color: #bbb; cursor: pointer; font-size: 0.8rem;
  text-align: center; transition: all .15s; font-family: inherit;
}
.rel-type-btn:hover { background: #2a2d5a; color: #fff; }
.rel-type-btn.selected { background: #6a82fb33; border-color: #6a82fb; color: #6a82fb; }
/* Phase 3: Plot conflict */
.conflict-output {
  background: #0d0f1a; border: 1px solid #2a2d4a; border-radius: 10px;
  padding: 20px; margin-top: 16px; line-height: 1.8; font-size: 0.88rem; color: #ccc;
}
.conflict-output h4 { color: #f0c27f; margin: 16px 0 8px; font-size: 0.95rem; }
.conflict-output h4:first-child { margin-top: 0; }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>📖 小说取名模拟器</h1>
    <p>生成 · 收藏 · 诠释你的小说角色名字</p>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="generator">🎲 生成器</button>
    <button class="tab-btn" data-tab="library">📚 本地库</button>
    <button class="tab-btn" data-tab="relations">🔗 关系图谱</button>
    <button class="tab-btn" data-tab="plot">⚡ 剧情工坊</button>
  </div>

  <!-- GENERATOR TAB -->
  <div class="tab-panel active" id="panel-generator">
    <div class="main-layout">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">角色类型</div>
          <div class="btn-group" id="roleTypeBtns"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">性别</div>
          <div class="btn-group-h" id="genderBtns"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">风格背景</div>
          <div class="btn-group" id="styleBtns"></div>
        </div>
      </div>
      <div class="content">
        <div class="content-top">
          <div class="info">已选择: <span id="selectionDisplay">主角 · 男 · 都市</span></div>
          <button class="btn-gen" id="generateBtn">生成名字</button>
        </div>
        <div class="controls-row">
          <label>生成数量 <select id="countSelect">
            <option value="5">5</option><option value="10" selected>10</option>
            <option value="20">20</option><option value="50">50</option>
          </select></label>

// ==================== AUTO-EXPLANATION GENERATOR ====================
function generateExplanation(name, styleId, genderId, roleId) {
  // For non-Chinese styles, use style-specific explanations
  const nonCN = ['japanese','western','russian','medieval','fantasy','scifi','cyberpunk','apocalypse','steampunk'];
  if (nonCN.includes(styleId)) {
    return generateNonCNExplanation(name, styleId, roleId, genderId);
  }
  return generateCNExplanation(name, styleId, roleId, genderId);
}

function generateCNExplanation(fullName, styleId, roleId, genderId) {
  // Separate surname and given name
  let givenName = '';
  // Try to strip known compound surnames and single surnames
  const knownSurnames = [...POOLS.cnSurnames, ...POOLS.cnCompound].sort((a,b)=>b.length-a.length);
  let temp = fullName.replace(/^【[^】]*】\s*/, '');
  for (const s of knownSurnames) {
    if (temp.startsWith(s)) { givenName = temp.slice(s.length); break; }
  }
  if (!givenName || givenName.length === 0) givenName = temp;

  // Analyze each character in given name
  const chars = [...givenName];
  const meanings = [];
  let knownChars = 0;
  for (const ch of chars) {
    if (CHAR_MEANING[ch]) { meanings.push(CHAR_MEANING[ch]); knownChars++; }
  }
  // If no known chars, use generic analysis
  if (knownChars === 0) {
    return generateGenericExplanation(fullName, styleId, roleId);
  }

  // Build explanation
  const templates = pickExplanationTemplate(styleId, roleId, givenName);
  const category = templates.category;
  const body = templates.body(meanings, givenName, fullName);
  return { category, body };
}

function detectPingZe(fullName) {
  const ping = new Set(['ā','á','ǎ','à','ō','ó','ǒ','ò','ē','é','ě','è','ī','í','ǐ','ì','ū','ú','ǔ','ù','ǖ','ǘ','ǚ','ǜ']);
  // Simplified: tone numbers 1,2 = ping (平), 3,4 = ze (仄)
  const toneMap = {
    'a':1,'ā':1,'á':2,'ǎ':3,'à':4,'o':1,'ō':1,'ó':2,'ǒ':3,'ò':4,'e':1,'ē':1,'é':2,'ě':3,'è':4,
    'i':1,'ī':1,'í':2,'ǐ':3,'ì':4,'u':1,'ū':1,'ú':2,'ǔ':3,'ù':4,'ü':1,'ǖ':1,'ǘ':2,'ǚ':3,'ǜ':4
  };
  // Simplified approach: use common ping/ze patterns for Chinese chars
  const pingChars = '明轩宇泽辰昊然浩博瑞琛霖凯恒毅逸彦哲远诚铭男中文仁和天云风宁阳涛辉超强伟勇杰鹏龙飞雷海文行修敬守望观抱思朝若胜知子之萱琪瑶婷雪琳菲慧燕雅欣悦彤蕾茜宁诗涵桐清晚语婉心晴凝冰烟兰秋思云落沉倾薇柳蝶蕊芊梦依轻柔月华歌书墨忆念惜静初庭素问忘夏采蓝长凤锦含露影踏音幽饮研捧玲璇瑟邪沅澧药归丝菱英玉梅秀芳芬珍';
  let result = '';
  for (const ch of fullName) {
    if (/[a-zA-Z]/.test(ch)) { result += '△'; continue; }
    if (pingChars.includes(ch)) result += '平'; else result += '仄';
  }
  return result;
}

// ==================== SOUND EFFECTS ====================
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    if (type === 'click') { osc.type='sine'; osc.frequency.setValueAtTime(880,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.08); }
    else if (type === 'success') { osc.type='sine'; osc.frequency.setValueAtTime(660,ctx.currentTime); osc.frequency.setValueAtTime(880,ctx.currentTime+0.07); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.15); }
    else if (type === 'remove') { osc.type='triangle'; osc.frequency.setValueAtTime(300,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+0.15); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.15); }
  } catch(e) {}
}

// ==================== BLACKLIST ====================
let blacklist = [];
function loadBlacklist() { try { blacklist = JSON.parse(localStorage.getItem('name_blacklist')||'[]'); } catch(e) { blacklist = []; } }
function saveBlacklist() { localStorage.setItem('name_blacklist', JSON.stringify(blacklist)); }
function addToBlacklist(displayName) { if (!blacklist.includes(displayName)) { blacklist.push(displayName); saveBlacklist(); playSound('remove'); showToast('📛 已加入黑名单: ' + displayName); } }
function removeFromBlacklist(name) { blacklist = blacklist.filter(n=>n!==name); saveBlacklist(); }

function showBlacklistModal() {
  loadBlacklist();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <h3>📛 黑名单管理</h3>
      <p style="color:#888;font-size:0.82rem;margin-bottom:16px;">以下名字在生成时将自动跳过（共${blacklist.length}个）</p>
      ${blacklist.length===0 ? '<p style="color:#555;text-align:center;padding:20px;">暂无黑名单</p>' :
        '<div style="max-height:300px;overflow-y:auto;">' + blacklist.map(n => `<div class="bl-item"><span class="bl-name">${n}</span><button class="bl-remove" data-name="${n}">移除</button></div>`).join('') + '</div>'}
      <div class="modal-actions"><button class="btn-cancel" id="blCancel">关闭</button>${blacklist.length>0?'<button class="btn-cancel" id="blClearAll" style="color:#fc5c7d;">清空全部</button>':''}</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#blCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#blClearAll')?.addEventListener('click', () => { if(confirm('确定清空所有黑名单？')){ blacklist=[]; saveBlacklist(); overlay.remove(); showToast('黑名单已清空'); } });
  overlay.querySelectorAll('.bl-remove').forEach(b => b.addEventListener('click', () => { removeFromBlacklist(b.dataset.name); overlay.remove(); showBlacklistModal(); }));
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
}

function getDailyFortune() {

  const sampleNames = '子轩,昊天,浩然,宇航,诗涵,雨桐,梦瑶,清欢,晚晴,若曦,语嫣,婉清,心怡,芷若';
  const allNames = sampleNames.split(',');
  const hash = today.split('-').reduce((s,n)=>s+parseInt(n), 0);
  const name = allNames[hash % allNames.length];
  const chars = [...name];
  const meanings = chars.map(c => CHAR_MEANING[c] || '美好').join('；');
  const fortune = { date: today, name, chars, meanings };
  localStorage.setItem('daily_fortune', JSON.stringify(fortune));
  return fortune;
}

const rand = arr => arr[Math.random() * arr.length | 0];

// ==================== GENERATORS ====================
function cnName(gender) {
  const useCompound = Math.random() < 0.06;
  const sur = useCompound ? rand(POOLS.cnCompound) : rand(POOLS.cnSurnames);
  let given;
  if (gender === 'male') {
    if (Math.random() < 0.5) {
      given = rand(POOLS.cnMaleG);
    } else {
      const c1 = rand(POOLS.cnMaleC);
      const c2 = rand(POOLS.cnMaleC);
      given = c1 + (c1 !== c2 ? c2 : rand(POOLS.cnMaleC));
    }
  } else {
    if (Math.random() < 0.5) {
      given = rand(POOLS.cnFemaleG);
    } else {
      const c1 = rand(POOLS.cnFemaleC);
      const c2 = rand(POOLS.cnFemaleC);
      given = c1 + (c1 !== c2 ? c2 : rand(POOLS.cnFemaleC));
    }
  }
  return sur + given;
}

// ==================== GENERATE ====================
function generate() {
  loadBlacklist();
  const roleId = document.querySelector('#roleTypeBtns .active')?.dataset?.value || 'protagonist';
  const styleId = document.querySelector('#styleBtns .active')?.dataset?.value || 'urban';
  const genderId = document.querySelector('#genderBtns .active')?.dataset?.value || 'male';
  const count = parseInt(document.getElementById('countSelect').value);
  const role = DATA.charTypes.find(c => c.id === roleId);
  const style = DATA.styles.find(s => s.id === styleId);
  const gender = DATA.genders.find(g => g.id === genderId);
  const inclTitle = document.getElementById('includeTitle').checked;
  const wuxingEl = document.querySelector('#wuxingBtns .active');
  const wuxingFilter = wuxingEl ? wuxingEl.dataset.value : 'any';
  const dynastyEl = document.querySelector('#dynastyBtns .active');
  const dynastyFilter = dynastyEl ? dynastyEl.dataset.value : 'any';
  const charCountEl = document.querySelector('#charCountBtns .active');
  const charCountFilter = charCountEl ? parseInt(charCountEl.dataset.value) : 0;
  const isCombo = document.querySelector('#modeSwitch .active')?.dataset?.mode === 'combo';

  document.getElementById('selectionDisplay').textContent = role.label + ' · ' + gender.label + ' · ' + style.label;

  const genFn = GEN[roleId] || GEN.protagonist;
  const names = [];
  const maxAttempts = count * 20 + 100;
  let attempts = 0;
  while (names.length < count && attempts < maxAttempts) {
    attempts++;
    let rawName = '';
    if (isCombo) {
      rawName = genderId === 'male' ? rand(POOLS.cnSurnames) + rand(POOLS.cnMaleG) : rand(POOLS.cnSurnames) + rand(POOLS.cnFemaleG);
    } else if (dynastyFilter !== 'any') {
      const dynName = getNameForDynasty(dynastyFilter, genderId);
      if (dynName) rawName = rand(POOLS.cnSurnames) + dynName;
      else rawName = genFn(styleId, genderId);
    } else {
      rawName = genFn(styleId, genderId);
    }

    // Character count filter
    if (charCountFilter > 0) {
      const nameChars = [...rawName].filter(c => /[一-鿿]/.test(c)).length;
      if (nameChars !== charCountFilter) continue;
    }

    // Wuxing filter
    if (wuxingFilter !== 'any') {
      const wx = detectWuxing([...rawName]);
      if (!wx.includes(wuxingFilter)) continue;
    }

    const title = inclTitle ? getTitle(roleId, styleId, genderId) : '';
    const display = title ? title + ' ' + rawName : rawName;

    if (blacklist.includes(display)) continue;

    const zi = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(styleId) ? generateZi(rawName, genderId) : '';
    const hao = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(styleId) ? generateHao(styleId) : '';
    const nickname = generateNickname(styleId);
    const wuxing = detectWuxing([...rawName]);
    const pingze = detectPingZe(rawName);

    names.push({ display, rawName, title: inclTitle ? getTitle(roleId, styleId, genderId) : '', style: style.label, styleId, role: role.label, roleId, gender: gender.label, genderId, zi, hao, nickname, wuxing, pingze });
  }
  window._lastGeneratedNames = names;
  renderResults(names);
}

function renderResults(names) {
  const area = document.getElementById('resultArea');
  if (!names.length) {
    area.innerHTML = '<div class="empty-state"><div class="icon">🎭</div><p>选择角色类型和风格，点击「生成名字」</p></div>';
    return;
  }
  const isBatch = document.getElementById('batchModeCheck')?.checked;
  const list = document.createElement('div');
  list.className = 'name-list';
  names.forEach((n,i) => {
    const card = document.createElement('div');
    card.className = 'name-card' + (isBatch ? ' batch-mode' : '');
    if (blacklist.includes(n.display)) card.classList.add('blacklisted');
    const extras = [];
    if (n.zi) extras.push(`<span style="color:#aaa;">字:</span> ${n.zi}`);
    if (n.hao) extras.push(`<span style="color:#aaa;">号:</span> ${n.hao}`);
    if (n.nickname) extras.push(`<span style="color:#aaa;">绰号:</span> ${n.nickname}`);
    if (n.wuxing) extras.push(`<span style="color:#888;">[五行:${n.wuxing}]</span>`);
    if (n.pingze) extras.push(`<span style="color:#888;">[${n.pingze}]</span>`);
    const extrasHTML = extras.length ? `<div style="font-size:0.73rem;color:#999;margin-top:4px;">${extras.join(' ')}</div>` : '';
    card.innerHTML = `<input type="checkbox" class="batch-check" data-index="${i}"><div class="name">${n.display}</div><div class="desc">${n.role} · ${n.gender} · ${n.style}</div>${extrasHTML}<button class="blacklist-btn" title="加入黑名单">📛</button><div class="card-actions"><button class="btn-sm copy-btn">📋 复制</button><button class="btn-sm highlight save-btn">💾 保存</button></div>`;
    card.querySelector('.blacklist-btn').addEventListener('click', e => { e.stopPropagation(); addToBlacklist(n.display); card.classList.add('blacklisted'); });
    card.querySelector('.copy-btn').addEventListener('click', e => { e.stopPropagation();
      navigator.clipboard.writeText(n.display).then(() => { playSound('success'); showToast('✅ 已复制到剪贴板'); }).catch(() => showToast('复制失败'));
    });
    card.querySelector('.save-btn').addEventListener('click', e => { e.stopPropagation(); playSound('click');
      saveNameToLibrary(n, card);
    });
    card.querySelector('.batch-check')?.addEventListener('change', e => { e.stopPropagation();
      card.classList.toggle('batch-selected', e.target.checked);
    });
    list.appendChild(card);
  });
  area.innerHTML = '';
  area.appendChild(list);
}

let books = [];
function loadBooks() { try { books = JSON.parse(localStorage.getItem('novel_books2') || '[]'); } catch(e) { books = []; } }
function saveBooks() { localStorage.setItem('novel_books2', JSON.stringify(books)); }
function getBook(id) { return books.find(b => b.id === id); }

function saveNameToLibrary(n, cardEl) {
  if (!books.length) { showCreateBookModal(n); return; }

}

function showSaveModal(n, cardEl) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

      <h3>💾 保存到书册</h3>

    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#createNewFromSave').addEventListener('click', () => { overlay.remove(); showCreateBookModal(n); });
  overlay.querySelector('#saveCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#saveConfirm').addEventListener('click', () => {
    const bookId = overlay.querySelector('#saveBookSelect').value;
    const book = getBook(bookId);
    if (!book) { showToast('书册不存在'); overlay.remove(); return; }
    // Auto-generate explanation on save
    const exp = generateExplanation(n.display, n.styleId, n.genderId, n.roleId);
    book.characters.push({
      id: uid(),
      display: n.display, rawName: n.rawName, title: n.title,
      role: n.role, roleId: n.roleId,
      gender: n.gender, genderId: n.genderId,
      style: n.style, styleId: n.styleId,
      zi: n.zi || '', hao: n.hao || '', nickname: n.nickname || '',
      wuxing: n.wuxing || '', pingze: n.pingze || '',
      explanation: exp,
      remarks: '',
      profile: { age: '', appearance: '', personality: '', backstory: '', catchphrase: '', ability: '' },
      createdAt: new Date().toISOString(),
    });
    book.updatedAt = new Date().toISOString();
    saveBooks();
    overlay.remove();
    if (cardEl) { cardEl.classList.add('saved'); cardEl.querySelector('.save-btn').textContent = '✅ 已保存'; }
    showToast('✅ 已保存到《' + book.title + '》');
  });
}

      <label>风格</label><select id="bookStyleSelect">${DATA.styles.map(s => `<option value="${s.id}">${s.label} ${s.desc}</option>`).join('')}</select>
      <div class="modal-actions"><button class="btn-cancel" id="createCancel">取消</button><button class="btn-gen" id="createConfirm">创建</button></div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#createCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#createConfirm').addEventListener('click', () => {
    const title = overlay.querySelector('#bookTitleInput').value.trim();
    if (!title) { showToast('请输入书名'); return; }
    const book = {
      id: uid(),
      title,
      author: overlay.querySelector('#bookAuthorInput').value.trim() || '佚名',
      description: overlay.querySelector('#bookDescInput').value.trim(),
      style: overlay.querySelector('#bookStyleSelect').value,
      characters: [],
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    books.push(book); saveBooks(); overlay.remove();
    showToast('✅ 书册《' + title + '》已创建');
    if (saveAfter) { showSaveModal(saveAfter, null); } else { renderLibrary(); }
  });
  overlay.querySelector('#bookTitleInput').focus();
}

function renderLibrary() {
  const area = document.getElementById('libraryContent');
  if (!books.length) {
    area.innerHTML = `<div class="empty-state"><div class="icon">📚</div><p>还没有创建任何书册</p><p style="color:#555;font-size:0.85rem;margin-top:8px;">在生成器中生成名字后保存，或直接创建书册</p><button class="btn-gen" id="firstBookBtn">📖 创建第一本书册</button></div>`;
    area.querySelector('#firstBookBtn')?.addEventListener('click', () => showCreateBookModal(null));
    return;
  }
  const styleIcons = { urban:'🏙️', xianxia:'☯️', ancient:'🏯', wuxia:'⚔️', medieval:'🏰', cyberpunk:'🤖', japanese:'🗾', western:'🗽', russian:'❄️', fantasy:'🐉', scifi:'🚀', apocalypse:'☢️', steampunk:'⚙️', mystery:'🔍', cthulhu:'🐙', republic:'🎭' };
  area.innerHTML = `<div class="lib-header"><div class="lib-title">📚 我的书库 <span>(${books.length}本)</span></div><button class="btn-gen small" id="newBookBtn">+ 新建书册</button></div>
    <div class="book-grid">${books.map(b => `<div class="book-card" data-id="${b.id}"><div class="book-icon">${styleIcons[b.style]||'📖'}</div><div class="book-title">${b.title}</div><div class="book-meta">✍️ ${b.author} · ${new Date(b.updatedAt).toLocaleDateString()}</div>${b.description?`<div class="book-desc">${b.description}</div>`:''}<div class="book-count">${b.characters.length}个角色</div><button class="delete-book" data-id="${b.id}">🗑️ 删除</button></div>`).join('')}</div>`;
  area.querySelector('#newBookBtn').addEventListener('click', () => showCreateBookModal(null));
  area.querySelectorAll('.book-card').forEach(card => { card.addEventListener('click', e => { if(e.target.closest('.delete-book')) return; renderBookDetail(card.dataset.id); }); });
  area.querySelectorAll('.delete-book').forEach(btn => { btn.addEventListener('click', e => { e.stopPropagation(); const b = getBook(btn.dataset.id); if(!b) return; if(confirm(`确定删除《${b.title}》及其中${b.characters.length}个角色？`)){ books = books.filter(x=>x.id!==b.id); saveBooks(); renderLibrary(); showToast('已删除《'+b.title+'》'); } }); });
}

        ${hasProfile ? `<div class="char-section"><div class="char-section-label">📋 角色档案</div><div style="font-size:0.78rem;color:#bbb;">${[c.profile.age&&'年龄:'+c.profile.age, c.profile.personality&&'性格:'+c.profile.personality].filter(Boolean).join(' · ')}</div></div>` : ''}

function showRegenerateExplanationModal(bookId, charId) {
  const book = getBook(bookId);
  if (!book) return;
  const ch = book.characters.find(c => c.id === charId);
  if (!ch) return;

  const newExp = generateExplanation(ch.display, ch.styleId, ch.genderId, ch.roleId);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>🔄 重新解读 — ${ch.display}</h3>
      <div style="color:#888;font-size:0.8rem;margin-bottom:12px;">模拟器为该名字生成的全新解读：</div>

        ${newExp.body.replace(/\n/g,'<br>')}

        <button class="btn-gen" id="regSave">应用新解读</button>

// ==================== PROFILE EDITOR ====================
function generateProfileSuggestion(char) {
  const roleTexts = {
    protagonist: { male:['青年才俊','天赋异禀的少年','命途多舛的独行者','胸怀大志的追梦人'], female:['婉约坚韧的少女','聪慧过人的才女','命运坎坷的佳人','心怀理想的追光者'] },
    villain: { male:['阴鸷深沉的反派','野心勃勃的枭雄','为达目的不择手段','表面温文尔雅的阴谋家'], female:['美艳狠辣的蛇蝎','冷艳腹黑的幕后推手','心机深沉的女王','外柔内毒的伪装者'] },
    supporter: { male:['忠肝义胆的挚友','出身平凡的可靠伙伴','风趣幽默的开心果','沉默寡言的技术高手'], female:['善解人意的闺蜜','率直开朗的搭档','温柔体贴的知心人','古灵精怪的辅助者'] },
    elder: { male:['德高望重的长者','深藏不露的隐世高人','固执却慈祥的长辈','饱经沧桑的守护者'], female:['慈眉善目的老奶奶','严厉却心软的长辈','神秘的古老家族掌管者','睿智通透的过来人'] },
    deity: { male:['俯瞰众生的神明','堕入凡间的谪仙','无心无情的天道','为情所困的神魔'], female:['冷若冰霜的女神','慈悲为怀的圣女','妖艳魅惑的妖后','来历不明的超然存在'] },
  };
  const r = roleTexts[char.roleId] || roleTexts.supporter;
  const g = r[char.genderId] || Object.values(r)[0];
  return {
    personality: rand(g),
    backstory: `${char.display}作为${char.role}，在${char.style}的世界观中，有着一段不为人知的过往。命运的齿轮从那一刻开始转动，牵引着ta走向既定的道路。`,
    catchphrase: Math.random()<0.5?'':`"${['这就是命吧','我从不相信命运','只有强者才能制定规则','真正的力量来自内心','这个世界需要改变'][Math.random()*5|0]}"`
  };
}

function showProfileEditor(bookId, charId) {
  const book = getBook(bookId); if (!book) return;

// ==================== EXPORT ====================
function exportBookMarkdown(book) {
  let md = `# 《${book.title}》角色档案\n\n**作者：** ${book.author}  \n**角色数量：** ${book.characters.length}  \n**最后更新：** ${new Date(book.updatedAt).toLocaleDateString()}\n\n---\n\n`;
  if (book.description) md += `> ${book.description}\n\n`;
  book.characters.forEach((c,i) => {
    md += `## ${i+1}. ${c.display}\n\n`;
    md += `| 属性 | 内容 |\n|------|------|\n`;
    md += `| 角色 | ${c.role} |\n`;
    md += `| 性别 | ${c.gender} |\n`;
    md += `| 风格 | ${c.style} |\n`;
    if (c.zi) md += `| 字 | ${c.zi} |\n`;
    if (c.hao) md += `| 号 | ${c.hao} |\n`;
    if (c.nickname) md += `| 绰号 | ${c.nickname} |\n`;
    if (c.wuxing) md += `| 五行 | ${c.wuxing} |\n`;
    if (c.pingze) md += `| 平仄 | ${c.pingze} |\n`;
    if (c.explanation) md += `| 名字解读 | ${c.explanation.category}——${c.explanation.body.replace(/\n/g,' ')} |\n`;
    if (c.remarks) md += `| 备注 | ${c.remarks} |\n`;
    if (c.profile) {
      if (c.profile.age) md += `| 年龄 | ${c.profile.age} |\n`;
      if (c.profile.personality) md += `| 性格 | ${c.profile.personality} |\n`;
      if (c.profile.appearance) md += `| 外貌 | ${c.profile.appearance} |\n`;
      if (c.profile.ability) md += `| 能力 | ${c.profile.ability} |\n`;
      if (c.profile.backstory) md += `| 背景 | ${c.profile.backstory} |\n`;
      if (c.profile.catchphrase) md += `| 口头禅 | ${c.profile.catchphrase} |\n`;
    }
    md += '\n';
  });
  if (book.relationships && book.relationships.length) {
    const relTypes = { '师徒':'师徒关系','恋人':'恋人情侣','仇敌':'仇敌对立','兄弟':'兄弟至交','朋友':'好友同伴','主仆':'主仆关系','同盟':'盟友同盟','暗恋':'暗恋单思' };
    md += `## 角色关系\n\n`;
    book.relationships.forEach(r => {
      const from = book.characters.find(c => c.id === r.from);
      const to = book.characters.find(c => c.id === r.to);
      if (from && to) md += `- **${from.display}** ← ${relTypes[r.type]||r.type} → **${to.display}**\n`;
    });
  }
  const blob = new Blob([md],{type:'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`${book.title}_角色档案.md`; a.click(); URL.revokeObjectURL(url);
  showToast('✅ Markdown 已导出');
}

// ==================== RELATIONSHIP GRAPH ====================
function renderRelations() {
  const area = document.getElementById('relationsContent');
  if (!books.length) {
    area.innerHTML = '<div class="empty-state"><div class="icon">🔗</div><p>还没有创建任何书册</p></div>';
    return;
  }
  area.innerHTML = `<div class="back-bar"><label for="relBookSelect" style="color:#aaa;font-size:0.85rem;">选择书册：</label>
    <select id="relBookSelect" style="background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.85rem;font-family:inherit;">
      ${books.map(b => `<option value="${b.id}">${b.title} (${b.characters.length}个角色)</option>`).join('')}
    </select>
    <button class="btn-gen small" id="relReset">重置位置</button></div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      <div class="graph-container" style="flex:1;min-width:500px;height:500px;">
        <canvas id="relCanvas" width="700" height="500"></canvas>
      </div>
      <div style="width:200px;flex-shrink:0;" id="relSidebar"></div>
    </div>
    <div class="graph-legend" id="relLegend"></div>`;
  area.querySelector('#relBookSelect').addEventListener('change', () => initGraph());
  area.querySelector('#relReset').addEventListener('click', () => { const book = getBook(area.querySelector('#relBookSelect').value); if(book){ delete book.nodePositions; delete book.relationships; saveBooks(); initGraph(); } });
  initGraph();
}

function initGraph() {
  const select = document.querySelector('#relBookSelect');
  if (!select) return;
  const book = getBook(select.value);
  if (!book) return;
  if (!book.relationships) book.relationships = [];
  if (!book.nodePositions) book.nodePositions = {};
  const canvas = document.getElementById('relCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const chars = book.characters;
  // Assign positions
  const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx,cy)-60;
  chars.forEach((c,i) => {
    if (!book.nodePositions[c.id]) {
      const angle = (2*Math.PI*i/chars.length) - Math.PI/2;
      book.nodePositions[c.id] = { x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle) };
    }
  });
  saveBooks();
  const roleColors = { protagonist:'#6a82fb',supporter:'#4ade80',villain:'#fc5c7d',elder:'#f0c27f',deity:'#c084fc',extra:'#888' };
  const relColors = { '师徒':'#4ade80','恋人':'#fc5c7d','仇敌':'#dc2626','兄弟':'#60a5fa','朋友':'#6a82fb','主仆':'#f0c27f','同盟':'#a78bfa','暗恋':'#f472b6' };
  let selected = null, dragging = null;

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // Draw relationships
    (book.relationships||[]).forEach(rel => {
      const f = book.nodePositions[rel.from], t = book.nodePositions[rel.to];
      if (!f || !t) return;
      ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(t.x,t.y);
      ctx.strokeStyle = relColors[rel.type]||'#888'; ctx.lineWidth=2; ctx.setLineDash([]); ctx.stroke();
      // Label
      const mx=(f.x+t.x)/2, my=(f.y+t.y)/2;
      ctx.fillStyle=relColors[rel.type]||'#888'; ctx.font='11px sans-serif'; ctx.fillText(rel.type,mx-12,my-6);
    });
    // Draw nodes
    chars.forEach(c => {
      const p = book.nodePositions[c.id];
      if (!p) return;
      ctx.beginPath(); ctx.arc(p.x,p.y,selected===c.id?20:16,0,2*Math.PI);
      ctx.fillStyle = roleColors[c.roleId]||'#888';
      ctx.fill(); ctx.strokeStyle='#0d0f1a'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='12px sans-serif'; ctx.textAlign='center';
      ctx.fillText(c.display.length>8?c.display.slice(0,7)+'…':c.display, p.x, p.y-24);
    });
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const hit = chars.find(c => {
      const p = book.nodePositions[c.id];
      return p && Math.hypot(mx-p.x, my-p.y) < 20;
    });
    if (hit) {
      if (selected && hit.id !== selected.id) {
        showRelationshipModal(book, selected.id, hit.id, () => { draw(); updateRelSidebar(book); });
        selected = null;
      } else {
        selected = selected===hit.id ? null : hit.id;
        dragging = selected ? hit.id : null;
      }
      draw();
    } else { selected = null; draw(); }
    if (dragging) { e.preventDefault(); }
  });
  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const p = book.nodePositions[dragging];
    if (p) { p.x = e.clientX-rect.left; p.y = e.clientY-rect.top; draw(); }
  });
  canvas.addEventListener('mouseup', () => { if (dragging) { saveBooks(); dragging = null; } });

  function updateRelSidebar(book) {
    const sidebar = document.getElementById('relSidebar');
    if (!sidebar) return;
    const rels = book.relationships||[];
    sidebar.innerHTML = '<h4 style="color:#ddd;margin-bottom:8px;font-size:0.85rem;">已建立关系</h4>' +
      (rels.length===0?'<p style="color:#555;font-size:0.8rem;">点击两个角色节点建立关系</p>':
        rels.map(r => {
          const from = chars.find(c=>c.id===r.from), to = chars.find(c=>c.id===r.to);
          return `<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #1a1c32;font-size:0.78rem;">
            <span style="color:#ccc;">${from?from.display:'?'}</span>
            <span style="color:${relColors[r.type]||'#888'};">${r.type}</span>
            <span style="color:#ccc;">${to?to.display:'?'}</span>
            <button style="margin-left:auto;background:none;border:none;color:#555;cursor:pointer;" data-rel="${r.from}_${r.to}">✕</button></div>`;
        }).join(''));
    sidebar.querySelectorAll('button[data-rel]').forEach(b => {
      b.addEventListener('click', () => {
        const [f,t] = b.dataset.rel.split('_');
        book.relationships = book.relationships.filter(r=>!(r.from===f&&r.to===t)&&!(r.from===t&&r.to===f));
        saveBooks(); draw(); updateRelSidebar(book);
      });
    });
  }

  // Legend
  document.getElementById('relLegend').innerHTML = [
    ...Object.entries(roleColors).map(([k,v]) => `<div class="legend-item"><div class="legend-dot" style="background:${v}"></div>${DATA.charTypes.find(c=>c.id===k)?.label||k}</div>`),
    ...Object.entries(relColors).map(([k,v]) => `<div class="legend-item"><div class="legend-line" style="background:${v}"></div>${k}</div>`)
  ].join('');

  draw();
  updateRelSidebar(book);
}

function showRelationshipModal(book, fromId, toId, onSave) {
  const from = book.characters.find(c=>c.id===fromId), to = book.characters.find(c=>c.id===toId);
  if (!from || !to) return;
  const relTypes = ['师徒','恋人','仇敌','兄弟','朋友','主仆','同盟','暗恋'];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <h3>🔗 建立关系</h3>
      <div class="rel-modal-chars"><span>${from.display}</span><span class="rel-arrow">→</span><span>${to.display}</span></div>
      <div class="rel-type-grid">${relTypes.map(t => `<button class="rel-type-btn" data-type="${t}">${t}</button>`).join('')}</div>
      <div class="modal-actions"><button class="btn-cancel" id="relCancel">取消</button></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#relCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelectorAll('.rel-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      book.relationships.push({ from: fromId, to: toId, type: btn.dataset.type });
      saveBooks(); overlay.remove();
      if (onSave) onSave();
      showToast('✅ 关系已建立');
    });
  });
}

function updatePlotCharSelects() {
  const bookId = document.querySelector('#plotBookSelect')?.value;
  if (!bookId) return;
  const book = getBook(bookId);
  if (!book) return;
  const opts = book.characters.map(c => `<option value="${c.id}">${c.display} (${c.role})</option>`).join('');
  ['A','B','C'].forEach(l => {
    const sel = document.querySelector('#plotChar'+l);
    if (sel) {
      const val = sel.value;
      sel.innerHTML = (l==='C'?'<option value="">不使用</option>':'') + opts;
      if (val && book.characters.find(c=>c.id===val)) sel.value = val;
    }
  });
}

function generatePlotConflict() {
  const bookId = document.querySelector('#plotBookSelect')?.value;
  const book = getBook(bookId);
  if (!book) return;
  const a = book.characters.find(c=>c.id===document.querySelector('#plotCharA')?.value);
  const b = book.characters.find(c=>c.id===document.querySelector('#plotCharB')?.value);
  const c = book.characters.find(c=>c.id===document.querySelector('#plotCharC')?.value);
  const conflictType = document.querySelector('#plotConflictType')?.value || 'emotional';
  if (!a || !b) { showToast('请选择至少两个角色'); return; }

  const typeInfo = {
    emotional: { name:'情感纠葛', cause:['命运让他们相遇却走到对立面','一段无法明说的感情','背叛与失望的累积','被第三个人打破的平衡'], escalate:['误会越来越深','嫉妒吞噬理智','爱的反面是恨'], climax:'在某个关键节点，两人才惊觉彼此一直在误会对方——但已经太迟了。' },
    interest: { name:'利益冲突', cause:['一方掌握另一方急需的资源','某种力量的分配不公','为了生存而不得不对抗','隐藏的宝藏或秘密'], escalate:['互相设局','盟友变成敌人','代价越来越高'], climax:'双方都意识到，这场博弈没有赢家——但谁先收手，谁就输了。' },
    ideology: { name:'理念对立', cause:['对正义的不同理解','传统与变革的碰撞','家族信条的束缚','不同世界的价值观'], escalate:['从争辩到决裂','各自纠集支持者','原则比感情更重要'], climax:'当两套理念在现实中正面相撞，没有一个理念能完全存活——破碎的，是人的心。' },
    destiny: { name:'宿命对决', cause:['古老的预言','血脉的诅咒','轮回中注定的敌人','正义与邪恶的最终较量'], escalate:['退无可退','身边的人开始倒下','世界在崩塌'], climax:'宿命说他们必须打——但他们心中都隐约觉得，命运也许只是一场可笑的谎言。' },
    misunderstand: { name:'误会陷阱', cause:['一个善意的谎言被揭穿','被人蓄意离间','巧合的时间差','不愿解释的倔强'], escalate:['裂痕越来越大','信任彻底崩塌','无法原谅的伤害'], climax:'真相终于浮出水面——但伤痕已经太深。就算知道是误会，还能回到从前吗？' },
  };
  const info = typeInfo[conflictType];
  const chars = [a,b]; if (c) chars.push(c);
  const charIntro = chars.map(ch => {
    const p = ch.profile;
    const traits = [p?.personality, p?.age, p?.ability].filter(Boolean);
    return `**${ch.display}**（${ch.role}${traits.length?'，'+traits.join('，'):''}）`;
  }).join('\n\n');

  const output = `
#### 🎬 冲突起因
${rand(info.cause)}。${chars.length>2 ? chars[2].display+'的介入让事情变得更加复杂。' : ''}

${charIntro}

#### 📈 冲突升级
${rand(info.escalate)}。昔日的情谊在利益的漩涡中被撕裂，每一次交锋都在彼此的心中刻下更深的伤痕。

#### ⚔️ 高潮
${info.climax}

#### 🌅 可能结局
- **结局一（悲剧）**：一方的消失或死亡，让一切戛然而止。
- **结局二（和解）**：意想不到的第三方力量介入，让双方不得不放下成见，发现其实可以并肩作战。
- **结局三（反转）**：原来这一切冲突的背后，都是被人设下的局——而真正的敌人，从未被注意到。

> ⚡ *此剧情由模拟器自动生成。好故事的灵魂，在于你赋予角色的温度与呼吸。*
`;

  document.getElementById('plotOutput').innerHTML = `<div class="conflict-output">${output.replace(/\n/g,'<br>')}</div>
    <div style="margin-top:12px;display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn-gen ghost" id="copyPlotBtn">📋 复制剧情</button>
      <button class="btn-gen ghost" id="regenPlotBtn">🔄 重新生成</button>
    </div>`;
  document.getElementById('copyPlotBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(output.replace(/<br>/g,'\n').replace(/\*\*/g,'').replace(/\*/g,''));
    showToast('✅ 已复制');
  });
  document.getElementById('regenPlotBtn').addEventListener('click', generatePlotConflict);
}

function exportSelectedCSV() {
  const cards = document.querySelectorAll('.name-card.batch-selected');

  let csv = '﻿姓名,角色,性别,风格,字,号,绰号,五行,平仄\n';
  const resultNames = window._lastGeneratedNames || [];
  cards.forEach(card => {
    const idx = parseInt(card.querySelector('.batch-check')?.dataset.index);
    if (idx >= 0 && resultNames[idx]) {
      const n = resultNames[idx];
      csv += `"${n.display}","${n.role}","${n.gender}","${n.style}","${n.zi||''}","${n.hao||''}","${n.nickname||''}","${n.wuxing||''}","${n.pingze||''}"\n`;
    }
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='角色名字.csv'; a.click(); URL.revokeObjectURL(url);
  showToast('✅ CSV 已导出');
}

    console.error('DOMContentLoaded error:', e.message);
  }
});
</script>
