<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说取名模拟器</title>
<style>
:root, [data-theme="dark"] {
  --bg-primary: #0d0f1a;
  --bg-secondary: #16182a;
  --bg-tertiary: #1a1c32;
  --bg-surface: #1e2038;
  --bg-hover: #2a2d5a;
  --border: #2a2d4a;
  --text-primary: #e0e0e0;
  --text-secondary: #ccc;
  --text-tertiary: #aaa;
  --text-dim: #888;
  --text-faint: #666;
  --accent: #6a82fb;
  --accent-gold: #f0c27f;
  --accent-rose: #fc5c7d;
  --accent-green: #4ade80;
  --gradient-btn: linear-gradient(135deg, #6a82fb, #fc5c7d);
  --gradient-header: linear-gradient(135deg, #f0c27f, #fc5c7d, #6a82fb);
  --input-bg: #0d0f1a;
  --overlay: #00000088;
  --card-hover: #22244a;
  --text-bright: #fff;
  --shadow: #00000044;
}
[data-theme="classical"] {
  --bg-primary: #f5f0e8;
  --bg-secondary: #ede4d6;
  --bg-tertiary: #e8dcc8;
  --bg-surface: #dfd0b8;
  --bg-hover: #d4c4a8;
  --border: #c4b8a0;
  --text-primary: #3d2e1c;
  --text-secondary: #5a4430;
  --text-tertiary: #7d6b55;
  --text-dim: #9e8e7a;
  --text-faint: #b8a898;
  --accent: #8b4513;
  --accent-gold: #b8860b;
  --accent-rose: #cd5c5c;
  --accent-green: #6b8e23;
  --gradient-btn: linear-gradient(135deg, #8b4513, #cd5c5c);
  --gradient-header: linear-gradient(135deg, #b8860b, #cd5c5c, #8b4513);
  --input-bg: #faf7f2;
  --overlay: #3d2e1c88;
  --card-hover: #d8c8b0;
  --text-bright: #1a1008;
  --shadow: #3d2e1c22;
}
[data-theme="xianxia"] {
  --bg-primary: #0a0e27;
  --bg-secondary: #111640;
  --bg-tertiary: #181d4a;
  --bg-surface: #1f2558;
  --bg-hover: #2a3068;
  --border: #2d3366;
  --text-primary: #d0d8ff;
  --text-secondary: #b0b8e0;
  --text-tertiary: #8088b8;
  --text-dim: #606898;
  --text-faint: #485078;
  --accent: #7c8cf8;
  --accent-gold: #e8c860;
  --accent-rose: #e87890;
  --accent-green: #60d8a0;
  --gradient-btn: linear-gradient(135deg, #7c8cf8, #a878e8);
  --gradient-header: linear-gradient(135deg, #e8c860, #e87890, #7c8cf8);
  --input-bg: #0a0e27;
  --overlay: #0a0e2788;
  --card-hover: #252d60;
  --text-bright: #fff;
  --shadow: #0a0e2744;
}
[data-theme="forest"] {
  --bg-primary: #0f1a14;
  --bg-secondary: #16281e;
  --bg-tertiary: #1c3026;
  --bg-surface: #243a2e;
  --bg-hover: #2e483a;
  --border: #324a3e;
  --text-primary: #d8e8dc;
  --text-secondary: #b8ccbe;
  --text-tertiary: #8aa898;
  --text-dim: #6a8a78;
  --text-faint: #4a6a58;
  --accent: #5aac78;
  --accent-gold: #c8b858;
  --accent-rose: #d07070;
  --accent-green: #60d870;
  --gradient-btn: linear-gradient(135deg, #5aac78, #8ac858);
  --gradient-header: linear-gradient(135deg, #c8b858, #d07070, #5aac78);
  --input-bg: #0f1a14;
  --overlay: #0f1a1488;
  --card-hover: #2a4a34;
  --text-bright: #fff;
  --shadow: #0f1a1444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
}
.app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
header { text-align: center; padding: 24px 0 16px; }
header h1 {
  font-size: 2rem;
  background: var(--gradient-header);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; font-weight: 800; letter-spacing: 2px;
}
header p { color: var(--text-dim); margin-top: 6px; font-size: 0.9rem; }
.tab-bar {
  display: flex; background: var(--bg-secondary); border-radius: 12px;
  border: 1px solid var(--border); overflow: hidden; margin: 16px 0 24px;
}
.tab-btn {
  flex: 1; padding: 14px 20px; border: none; background: transparent;
  color: var(--text-dim); font-size: 0.95rem; font-weight: 600; cursor: pointer;
  transition: all .2s; font-family: inherit; position: relative;
}
.tab-btn:hover { color: var(--text-secondary); background: var(--bg-surface); }
.tab-btn.active { color: var(--text-bright); background: linear-gradient(135deg, #6a82fb22, #fc5c7d22); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 2px;
  background: linear-gradient(90deg, #6a82fb, #fc5c7d); border-radius: 1px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.main-layout { display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
@media (max-width: 768px) { .main-layout { grid-template-columns: 1fr; } }
.sidebar {
  background: var(--bg-secondary); border-radius: 16px; padding: 20px 16px;
  border: 1px solid var(--border); height: fit-content;
}
.sidebar-section { margin-bottom: 20px; }
.sidebar-section:last-child { margin-bottom: 0; }
.sidebar-label {
  font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 10px; font-weight: 600;
}
.btn-group { display: flex; flex-direction: column; gap: 6px; max-height: 420px; overflow-y: auto; }
.btn-group-h { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-opt {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-surface); color: var(--text-primary); cursor: pointer; font-size: 0.85rem;
  transition: all .2s; text-align: left; font-family: inherit;
}
.btn-opt:hover { background: #2a2d5a; color: var(--text-bright); }
.btn-opt.active { background: linear-gradient(135deg,#6a82fb33,#fc5c7d33); border-color: var(--accent); color: var(--text-bright); }
.btn-opt.small { padding: 6px 14px; font-size: 0.8rem; text-align: center; flex:1; }
.content {
  background: var(--bg-secondary); border-radius: 16px; border: 1px solid var(--border);
  padding: 28px; min-height: 400px;
}
.content-top {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
}
.content-top .info { font-size: 0.9rem; color: var(--text-tertiary); }
.content-top .info span { color: var(--accent-gold); font-weight: 600; }
.btn-gen {
  padding: 12px 36px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #6a82fb, #fc5c7d);
  color: var(--text-bright); font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: transform .15s, box-shadow .15s; font-family: inherit; letter-spacing: 1px;
}
.btn-gen:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #6a82fb44; }
.btn-gen:active { transform: translateY(0); }
.btn-gen.small { padding: 8px 16px; font-size: 0.8rem; }
.btn-gen.ghost {
  background: transparent; border: 1px solid var(--border); color: var(--text-tertiary);
}
.btn-gen.ghost:hover { background: #2a2d5a; color: var(--text-bright); box-shadow: none; }
.controls-row {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  margin-bottom: 24px; padding: 16px; background: var(--bg-tertiary); border-radius: 12px;
}
.controls-row label { font-size: 0.85rem; color: var(--text-tertiary); display: flex; align-items: center; gap: 8px; }
.controls-row select, .controls-row input {
  background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
  padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; font-family: inherit;
}
.controls-row select option { background: var(--bg-tertiary); }
.controls-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }
.name-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.name-card {
  background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; transition: all .2s; position: relative;
  user-select: none; display: flex; flex-direction: column;
}
.name-card:hover { border-color: var(--accent); background: #22244a; }
.name-card .name { font-size: 1.1rem; font-weight: 600; color: var(--text-bright); }
.name-card .desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
.name-card .card-actions {
  display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end;
  opacity: 0; transition: opacity .2s;
}
.name-card:hover .card-actions { opacity: 1; }
.card-actions .btn-sm {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-primary); color: var(--text-tertiary); cursor: pointer; font-size: 0.75rem;
  font-family: inherit; transition: all .15s;
}
.card-actions .btn-sm:hover { background: #2a2d5a; color: var(--text-bright); border-color: var(--accent); }
.card-actions .btn-sm.highlight { border-color: #f0c27f66; color: var(--accent-gold); }
.name-card.saved { border-color: #4ade8066; background: #1a2a2a; }
.empty-state { text-align: center; padding: 40px 20px; color: #666; }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.95rem; }
.empty-state .btn-gen { margin-top: 16px; }
.lib-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
}
.lib-title { font-size: 1.3rem; font-weight: 700; color: var(--text-bright); }
.lib-title span { color: var(--accent-gold); }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.book-card {
  background: linear-gradient(145deg, #1a1c32, #1e2038);
  border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px;
  cursor: pointer; transition: all .25s; position: relative; overflow: hidden;
}
.book-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px #00000044; }
.book-card .book-icon { font-size: 2rem; margin-bottom: 12px; }
.book-card .book-title { font-size: 1.15rem; font-weight: 700; color: var(--text-bright); }
.book-card .book-meta { font-size: 0.8rem; color: var(--text-dim); margin-top: 6px; }
.book-card .book-desc {
  font-size: 0.82rem; color: var(--text-dim); margin-top: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.book-card .book-count {
  position: absolute; top: 16px; right: 16px;
  background: #6a82fb33; color: var(--accent); font-size: 0.75rem;
  padding: 2px 10px; border-radius: 20px; font-weight: 600;
}
.book-card .delete-book {
  position: absolute; bottom: 16px; right: 16px;
  background: none; border: none; color: #555; cursor: pointer;
  font-size: 0.75rem; padding: 4px 8px; border-radius: 6px;
  transition: all .15s; font-family: inherit;
}
.book-card .delete-book:hover { color: #fc5c7d; background: #fc5c7d22; }
.back-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn {
  background: none; border: 1px solid var(--border); color: var(--text-tertiary);
  padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
  transition: all .15s; font-family: inherit;
}
.back-btn:hover { background: #2a2d5a; color: var(--text-bright); }
.book-info-card {
  background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px 24px; margin-bottom: 24px;
}
.book-info-card h2 { font-size: 1.2rem; color: var(--text-bright); margin-bottom: 6px; }
.book-info-card .sub { font-size: 0.85rem; color: var(--text-dim); }
.char-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
}
.char-header h3 { font-size: 1rem; color: var(--text-secondary); }
.char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.char-card {
  background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; transition: all .15s;
}
.char-card:hover { border-color: #6a82fb44; }
.char-card .char-name { font-size: 1.1rem; font-weight: 600; color: var(--text-bright); }
.char-card .char-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.char-card .char-tag {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
  background: #2a2d4a; color: var(--text-tertiary);
}
.char-card .char-section { margin-top: 10px; }
.char-card .char-section-label {
  font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px; font-weight: 600;
}
.char-card .char-explain {
  padding: 10px 12px; background: var(--bg-secondary);
  border-radius: 8px; border: 1px solid #2a2d4a22;
  font-size: 0.82rem; color: var(--text-primary); line-height: 1.6;
}
.char-card .char-remark {
  padding: 8px 12px; background: var(--bg-secondary);
  border-radius: 8px; border: 1px dashed #2a2d4a44;
  font-size: 0.8rem; color: var(--text-dim); line-height: 1.5;
  font-style: italic;
}
.char-card .char-actions {
  display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end;
}
.char-card .char-actions .btn-sm {
  padding: 3px 10px; font-size: 0.7rem; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-tertiary);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.char-card .char-actions .btn-sm:hover { background: #2a2d5a; color: var(--text-bright); border-color: var(--accent); }
.char-card .delete-char:hover { border-color: #fc5c7d66 !important; color: #fc5c7d !important; }
.modal-overlay {
  position: fixed; inset: 0; background: #00000088;
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; max-width: 560px; width: 100%; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 24px 64px #00000066;
}
.modal h3 { font-size: 1.1rem; color: var(--text-bright); margin-bottom: 20px; }
.modal label { font-size: 0.85rem; color: var(--text-primary); display: block; margin-bottom: 6px; }
.modal input, .modal textarea, .modal select {
  width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
  padding: 10px 12px; border-radius: 8px; font-size: 0.9rem;
  font-family: inherit; margin-bottom: 16px; box-sizing: border-box;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--accent); }
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px;
}
.modal-actions .btn-gen { padding: 10px 24px; font-size: 0.9rem; }
.modal-actions .btn-cancel {
  padding: 10px 24px; border: 1px solid var(--border); border-radius: 12px;
  background: transparent; color: var(--text-tertiary); cursor: pointer; font-size: 0.9rem;
  font-family: inherit; transition: all .15s;
}
.modal-actions .btn-cancel:hover { background: #2a2d5a; color: var(--text-bright); }
.explain-box {
  background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin-bottom: 16px; font-size: 0.88rem;
  color: var(--text-secondary); line-height: 1.7; max-height: 200px; overflow-y: auto;
}
.explain-box .exp-category {
  display: inline-block; font-size: 0.7rem; padding: 2px 10px;
  border-radius: 4px; background: #6a82fb22; color: var(--accent);
  margin-bottom: 8px; font-weight: 600;
}
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-surface); border: 1px solid var(--border);
  padding: 12px 24px; border-radius: 10px; font-size: 0.85rem;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.rem-textarea {
  width: 100%; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
  padding: 10px 12px; border-radius: 8px; font-size: 0.85rem;
  font-family: inherit; margin-bottom: 16px; min-height: 60px; resize: vertical;
  box-sizing: border-box;
}
.rem-textarea:focus { outline: none; border-color: var(--accent-gold); }
.btn-sm.remark-btn { border-color: #f0c27f44 !important; color: #f0c27f !important; }
.btn-sm.remark-btn:hover { border-color: #f0c27f !important; background: #f0c27f22 !important; }
.explain-info {
  font-size: 0.75rem; color: #666; margin-top: 4px; text-align: center;
}
/* Phase 1: Blacklist & Daily Fortune */
.name-card .blacklist-btn {
  position: absolute; top: 8px; right: 40px;
  background: none; border: none; color: #555; cursor: pointer;
  font-size: 0.85rem; padding: 2px 6px; border-radius: 4px;
  opacity: 0; transition: all .15s;
}
.name-card:hover .blacklist-btn { opacity: 1; }
.name-card:hover .blacklist-btn:hover { color: #fc5c7d; background: #fc5c7d22; }
.name-card.blacklisted { opacity: 0.4; }
.daily-fortune {
  background: linear-gradient(135deg, #1a1c32, #22244a);
  border: 1px solid #f0c27f33; border-radius: 10px;
  padding: 12px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.daily-fortune .fortune-icon { font-size: 1.5rem; }
.daily-fortune .fortune-text { flex: 1; }
.daily-fortune .fortune-name { font-weight: 700; color: var(--accent-gold); font-size: 1.05rem; }
.daily-fortune .fortune-desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
.bl-mgmt-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: #2a2d4a; color: var(--text-tertiary); font-size: 0.75rem;
  padding: 4px 10px; border-radius: 6px; cursor: pointer;
  transition: all .15s; border: 1px solid transparent;
}
.bl-mgmt-chip:hover { color: #fc5c7d; border-color: #fc5c7d44; }
.bl-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: var(--bg-tertiary); border-radius: 6px;
  margin-bottom: 6px;
}
.bl-item .bl-name { font-size: 0.9rem; color: var(--text-secondary); }
.bl-item .bl-remove {
  background: none; border: none; color: #555; cursor: pointer;
  font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; transition: all .15s;
}
.bl-item .bl-remove:hover { color: #fc5c7d; background: #fc5c7d22; }
/* Phase 2: Filter section */
.filter-section { margin-bottom: 16px; }
.filter-section.hidden { display: none; }
.filter-section .sidebar-label { margin-bottom: 8px; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.filter-chip {
  padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-surface); color: var(--text-dim); cursor: pointer; font-size: 0.75rem;
  transition: all .15s; font-family: inherit;
}
.filter-chip:hover { background: #2a2d5a; color: var(--text-secondary); }
.filter-chip.active { background: #6a82fb22; border-color: var(--accent); color: var(--accent); }
.mode-switch {
  display: flex; background: var(--bg-tertiary); border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden; margin-top: 12px;
}
.mode-switch .mode-btn {
  flex: 1; padding: 8px 12px; border: none; background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 0.8rem; font-family: inherit;
  transition: all .15s;
}
.mode-switch .mode-btn.active { background: #6a82fb22; color: var(--text-bright); }
.batch-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; background: var(--bg-tertiary); border-radius: 8px;
  margin-top: 12px; border: 1px solid var(--border);
}
.name-card .batch-check {
  position: absolute; top: 10px; left: 10px;
  width: 18px; height: 18px; accent-color: var(--accent); display: none;
}
.name-card.batch-mode { padding-left: 36px; }
.name-card.batch-mode .batch-check { display: block; }
.name-card.batch-selected { border-color: #6a82fb88; background: #22245a; }
/* Phase 3: Profile card */
.profile-field {
  margin-bottom: 12px;
}
.profile-field label {
  font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.profile-field input, .profile-field textarea {
  width: 100%; background: var(--bg-primary); border: 1px solid var(--border);

// ==================== AUTO-EXPLANATION GENERATOR ====================
function generateExplanation(name, styleId, genderId, roleId) {
  // For non-Chinese styles, use style-specific explanations
  const nonCN = ['japanese','western','russian','medieval','fantasy','scifi','cyberpunk','apocalypse','steampunk'];
  if (nonCN.includes(styleId)) {
    return generateNonCNExplanation(name, styleId, roleId, genderId);
  }
  return generateCNExplanation(name, styleId, roleId, genderId);
}

function generateCNExplanation(fullName, styleId, roleId, genderId) {
  // Separate surname and given name
  let givenName = '';
  // Try to strip known compound surnames and single surnames
  const knownSurnames = [...POOLS.cnSurnames, ...POOLS.cnCompound].sort((a,b)=>b.length-a.length);
  let temp = fullName.replace(/^【[^】]*】\s*/, '');
  for (const s of knownSurnames) {
    if (temp.startsWith(s)) { givenName = temp.slice(s.length); break; }
  }
  if (!givenName || givenName.length === 0) givenName = temp;

  // Analyze each character in given name
  const chars = [...givenName];
  const meanings = [];
  let knownChars = 0;
  for (const ch of chars) {
    if (CHAR_MEANING[ch]) { meanings.push(CHAR_MEANING[ch]); knownChars++; }
  }
  // If no known chars, use generic analysis
  if (knownChars === 0) {
    return generateGenericExplanation(fullName, styleId, roleId);
  }

  // Build explanation
  const templates = pickExplanationTemplate(styleId, roleId, givenName);
  const category = templates.category;
  const body = templates.body(meanings, givenName, fullName);
  return { category, body };
}

        let text = `民国时期的名字，往往新旧交融，既有传统底蕴，又有新文化运动的开明气息。\n\n`;
        meanings.forEach((m,i) => { text += `"${given[i]}"——${m}\n`; });
        text += `\n在那个风云变幻的大时代，一个人的名字折射着家国情怀与时代精神。此名文雅不迂腐，开明不轻浮，很有民国文人的风骨。`;
        return text;
      }
    });
  }

  // Weighted random selection
  const totalWeight = templates.reduce((s,t) => s + t.weight, 0);
  let randVal = Math.random() * totalWeight;
  for (const t of templates) {
    randVal -= t.weight;
    if (randVal <= 0) return t;
  }
  return templates[0];
}

let blacklist = [];
function loadBlacklist() { try { blacklist = JSON.parse(localStorage.getItem('name_blacklist')||'[]'); } catch(e) { blacklist = []; } }
function saveBlacklist() { localStorage.setItem('name_blacklist', JSON.stringify(blacklist)); }
function addToBlacklist(displayName) { if (!blacklist.includes(displayName)) { blacklist.push(displayName); saveBlacklist(); playSound('remove'); showToast('📛 已加入黑名单: ' + displayName); } }
function removeFromBlacklist(name) { blacklist = blacklist.filter(n=>n!==name); saveBlacklist(); }

function showBlacklistModal() {
  loadBlacklist();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <h3>📛 黑名单管理</h3>
      <p style="color:#888;font-size:0.82rem;margin-bottom:16px;">以下名字在生成时将自动跳过（共${blacklist.length}个）</p>
      ${blacklist.length===0 ? '<p style="color:#555;text-align:center;padding:20px;">暂无黑名单</p>' :
        '<div style="max-height:300px;overflow-y:auto;">' + blacklist.map(n => `<div class="bl-item"><span class="bl-name">${n}</span><button class="bl-remove" data-name="${n}">移除</button></div>`).join('') + '</div>'}
      <div class="modal-actions"><button class="btn-cancel" id="blCancel">关闭</button>${blacklist.length>0?'<button class="btn-cancel" id="blClearAll" style="color:#fc5c7d;">清空全部</button>':''}</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#blCancel').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#blClearAll')?.addEventListener('click', () => { if(confirm('确定清空所有黑名单？')){ blacklist=[]; saveBlacklist(); overlay.remove(); showToast('黑名单已清空'); } });
  overlay.querySelectorAll('.bl-remove').forEach(b => b.addEventListener('click', () => { removeFromBlacklist(b.dataset.name); overlay.remove(); showBlacklistModal(); }));
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
}

// ==================== DAILY FORTUNE ====================
function getDailyFortune() {
  const today = new Date().toISOString().slice(0,10);
  const stored = JSON.parse(localStorage.getItem('daily_fortune')||'{}');
  if (stored.date === today && stored.name) return stored;
  // Use name chars directly to avoid POOLS dependency
  const sampleNames = '子轩,昊天,浩然,宇航,诗涵,雨桐,梦瑶,清欢,晚晴,若曦,语嫣,婉清,心怡,芷若';
  const allNames = sampleNames.split(',');
  const hash = today.split('-').reduce((s,n)=>s+parseInt(n), 0);
  const name = allNames[hash % allNames.length];
  const chars = [...name];
  const meanings = chars.map(c => CHAR_MEANING[c] || '美好').join('；');
  const fortune = { date: today, name, chars, meanings };
  localStorage.setItem('daily_fortune', JSON.stringify(fortune));
  return fortune;
}

function getNameForDynasty(dynasty, gender) {
  const g = (gender === 'neutral' || gender === 'dual') ? (Math.random() < 0.5 ? 'male' : 'female') : gender;
  const pool = (g==='male'?POOLS.dynastyMale:POOLS.dynastyFemale)[dynasty];
  if (pool && pool.length) return rand(pool);

}

function cnName(gender) {
  const useCompound = Math.random() < 0.06;
  const sur = useCompound ? rand(POOLS.cnCompound) : rand(POOLS.cnSurnames);
  let given;
  // neutral/dual use mixed male+female pools
  const g = (gender === 'neutral' || gender === 'dual') ? (Math.random() < 0.5 ? 'male' : 'female') : gender;
  if (g === 'male') {
    if (Math.random() < 0.5) {
      given = rand(POOLS.cnMaleG);
    } else {
      const c1 = rand(POOLS.cnMaleC);
      const c2 = rand(POOLS.cnMaleC);
      given = c1 + (c1 !== c2 ? c2 : rand(POOLS.cnMaleC));
    }
  } else {
    if (Math.random() < 0.5) {
      given = rand(POOLS.cnFemaleG);
    } else {
      const c1 = rand(POOLS.cnFemaleC);
      const c2 = rand(POOLS.cnFemaleC);
      given = c1 + (c1 !== c2 ? c2 : rand(POOLS.cnFemaleC));
    }
  }
  return sur + given;
}

    mystery: { protagonist_male: ['【名侦探】','【神探】','【犯罪心理专家】'], protagonist_female: ['【女侦探】','【法医专家】','【犯罪侧写师】'], mentor: ['【退休老刑警】','【犯罪学教授】'], lover: ['【知己恋人】','【暗恋对象】'], rival: ['【老对手】','【高智商罪犯】'] },
  };
  const pool = titlePools[t];
  if (!pool) return '';
  const key1 = r+'_'+g;
  const key2 = r;
  const key3 = 'default';
  const candidates = pool[key1] || pool[key2] || pool[key3];
  if (candidates && candidates.length) return rand(candidates);
  return '';
}

// ==================== GENERATE ====================
function generate() {
  loadBlacklist();
  const roleId = document.querySelector('#roleTypeBtns .active')?.dataset?.value || 'protagonist';
  const styleId = document.querySelector('#styleBtns .active')?.dataset?.value || 'urban';
  const genderId = document.querySelector('#genderBtns .active')?.dataset?.value || 'male';
  const count = parseInt(document.getElementById('countSelect').value);
  const role = DATA.charTypes.find(c => c.id === roleId);
  const style = DATA.styles.find(s => s.id === styleId);
  const gender = DATA.genders.find(g => g.id === genderId);
  const inclTitle = document.getElementById('includeTitle').checked;
  const wuxingEl = document.querySelector('#wuxingBtns .active');
  const wuxingFilter = wuxingEl ? wuxingEl.dataset.value : 'any';
  const dynastyEl = document.querySelector('#dynastyBtns .active');
  const dynastyFilter = dynastyEl ? dynastyEl.dataset.value : 'any';
  const charCountEl = document.querySelector('#charCountBtns .active');
  const charCountFilter = charCountEl ? parseInt(charCountEl.dataset.value) : 0;
  const isCombo = document.querySelector('#modeSwitch .active')?.dataset?.mode === 'combo';

  document.getElementById('selectionDisplay').textContent = role.label + ' · ' + gender.label + ' · ' + style.label;

  const genFn = GEN[roleId] || GEN.protagonist;
  const names = [];
  const maxAttempts = count * 20 + 100;
  let attempts = 0;
  while (names.length < count && attempts < maxAttempts) {
    attempts++;
    let rawName = '';
    if (isCombo) {
      rawName = genderId === 'male' ? rand(POOLS.cnSurnames) + rand(POOLS.cnMaleG) : rand(POOLS.cnSurnames) + rand(POOLS.cnFemaleG);
    } else if (dynastyFilter !== 'any') {
      const dynName = getNameForDynasty(dynastyFilter, genderId);
      if (dynName) rawName = rand(POOLS.cnSurnames) + dynName;
      else rawName = genFn(styleId, genderId);
    } else {
      rawName = genFn(styleId, genderId);
    }

    // Character count filter
    if (charCountFilter > 0) {
      const nameChars = [...rawName].filter(c => /[一-鿿]/.test(c)).length;
      if (nameChars !== charCountFilter) continue;
    }

    // Wuxing filter
    if (wuxingFilter !== 'any') {
      const wx = detectWuxing([...rawName]);
      if (!wx.includes(wuxingFilter)) continue;
    }

    const title = inclTitle ? getTitle(roleId, styleId, genderId) : '';
    const display = title ? title + ' ' + rawName : rawName;

    if (blacklist.includes(display)) continue;

    const zi = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(styleId) ? generateZi(rawName, genderId) : '';
    const hao = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(styleId) ? generateHao(styleId) : '';
    const nickname = generateNickname(styleId);
    const wuxing = detectWuxing([...rawName]);
    const pingze = detectPingZe(rawName);

    names.push({ display, rawName, title: inclTitle ? getTitle(roleId, styleId, genderId) : '', style: style.label, styleId, role: role.label, roleId, gender: gender.label, genderId, zi, hao, nickname, wuxing, pingze });
  }
  window._lastGeneratedNames = names;
  renderResults(names);
}

function renderResults(names) {
  const area = document.getElementById('resultArea');
  if (!names.length) {
    area.innerHTML = '<div class="empty-state"><div class="icon">🎭</div><p>选择角色类型和风格，点击「生成名字」</p></div>';
    return;
  }
  const isBatch = document.getElementById('batchModeCheck')?.checked;
  const list = document.createElement('div');
  list.className = 'name-list';
  names.forEach((n,i) => {
    const card = document.createElement('div');
    card.className = 'name-card' + (isBatch ? ' batch-mode' : '');
    if (blacklist.includes(n.display)) card.classList.add('blacklisted');
    const extras = [];
    if (n.zi) extras.push(`<span style="color:#aaa;">字:</span> ${n.zi}`);
    if (n.hao) extras.push(`<span style="color:#aaa;">号:</span> ${n.hao}`);
    if (n.nickname) extras.push(`<span style="color:#aaa;">绰号:</span> ${n.nickname}`);
    if (n.wuxing) extras.push(`<span style="color:#888;">[五行:${n.wuxing}]</span>`);
    if (n.pingze) extras.push(`<span style="color:#888;">[${n.pingze}]</span>`);
    const extrasHTML = extras.length ? `<div style="font-size:0.73rem;color:#999;margin-top:4px;">${extras.join(' ')}</div>` : '';
    card.innerHTML = `<input type="checkbox" class="batch-check" data-index="${i}"><div class="name">${n.display}</div><div class="desc">${n.role} · ${n.gender} · ${n.style}</div>${extrasHTML}<button class="blacklist-btn" title="加入黑名单">📛</button><div class="card-actions"><button class="btn-sm copy-btn">📋 复制</button><button class="btn-sm highlight save-btn">💾 保存</button></div>`;
    card.querySelector('.blacklist-btn').addEventListener('click', e => { e.stopPropagation(); addToBlacklist(n.display); card.classList.add('blacklisted'); });
    card.querySelector('.copy-btn').addEventListener('click', e => { e.stopPropagation();
      navigator.clipboard.writeText(n.display).then(() => { playSound('success'); showToast('✅ 已复制到剪贴板'); }).catch(() => showToast('复制失败'));
    });
    card.querySelector('.save-btn').addEventListener('click', e => { e.stopPropagation(); playSound('click');
      saveNameToLibrary(n, card);
    });
    card.querySelector('.batch-check')?.addEventListener('change', e => { e.stopPropagation();
      card.classList.toggle('batch-selected', e.target.checked);
    });
    list.appendChild(card);
  });
  area.innerHTML = '';
  area.appendChild(list);
}

function saveNameToLibrary(n, cardEl) {
  if (!books.length) { showCreateBookModal(n); return; }
  showSaveModal(n, cardEl);
}

    // Auto-generate explanation on save

    book.characters.push({

      gender: n.gender, genderId: n.genderId,
      style: n.style, styleId: n.styleId,

      wuxing: n.wuxing || '', pingze: n.pingze || '',

      remarks: '',

function exportBookMarkdown(book) {
  let md = `# 《${book.title}》角色档案\n\n**作者：** ${book.author}  \n**角色数量：** ${book.characters.length}  \n**最后更新：** ${new Date(book.updatedAt).toLocaleDateString()}\n\n---\n\n`;
  if (book.description) md += `> ${book.description}\n\n`;
  book.characters.forEach((c,i) => {
    md += `## ${i+1}. ${c.display}\n\n`;
    md += `| 属性 | 内容 |\n|------|------|\n`;
    md += `| 角色 | ${c.role} |\n`;
    md += `| 性别 | ${c.gender} |\n`;
    md += `| 风格 | ${c.style} |\n`;
    if (c.zi) md += `| 字 | ${c.zi} |\n`;
    if (c.hao) md += `| 号 | ${c.hao} |\n`;
    if (c.nickname) md += `| 绰号 | ${c.nickname} |\n`;
    if (c.wuxing) md += `| 五行 | ${c.wuxing} |\n`;
    if (c.pingze) md += `| 平仄 | ${c.pingze} |\n`;
    if (c.explanation) md += `| 名字解读 | ${c.explanation.category}——${c.explanation.body.replace(/\n/g,' ')} |\n`;
    if (c.remarks) md += `| 备注 | ${c.remarks} |\n`;
    if (c.profile) {
      if (c.profile.age) md += `| 年龄 | ${c.profile.age} |\n`;
      if (c.profile.personality) md += `| 性格 | ${c.profile.personality} |\n`;
      if (c.profile.appearance) md += `| 外貌 | ${c.profile.appearance} |\n`;
      if (c.profile.ability) md += `| 能力 | ${c.profile.ability} |\n`;
      if (c.profile.cultivation) md += `| 功法 | ${c.profile.cultivation} |\n`;
      if (c.profile.realm) md += `| 境界 | ${c.profile.realm} |\n`;
      if (c.profile.backstory) md += `| 背景 | ${c.profile.backstory} |\n`;
      if (c.profile.catchphrase) md += `| 口头禅 | ${c.profile.catchphrase} |\n`;
    }
    md += '\n';
  });
  if (book.relationships && book.relationships.length) {
    const relTypes = { '师徒':'师徒关系','恋人':'恋人情侣','仇敌':'仇敌对立','兄弟':'兄弟至交','朋友':'好友同伴','主仆':'主仆关系','同盟':'盟友同盟','暗恋':'暗恋单思' };
    md += `## 角色关系\n\n`;
    book.relationships.forEach(r => {
      const from = book.characters.find(c => c.id === r.from);
      const to = book.characters.find(c => c.id === r.to);
      if (from && to) md += `- **${from.display}** ← ${r.type} → **${to.display}**\n`;
    });
  }
  const blob = new Blob([md],{type:'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`${book.title}_角色档案.md`; a.click(); URL.revokeObjectURL(url);
  showToast('✅ Markdown 已导出');
}

function getRelColor(type) {
  for (const cat of Object.values(ALL_REL_TYPES)) {
    if (cat.types[type]) return cat.types[type].color;
  }
  return '#888';
}
function getRelDash(type) {
  for (const cat of Object.values(ALL_REL_TYPES)) {
    if (cat.types[type] && cat.types[type].dash) return cat.types[type].dash;
  }
  return [];
}

function initGraph() {
  const select = document.querySelector('#relBookSelect');
  if (!select) return;
  const book = getBook(select.value);
  if (!book) return;
  if (!book.relationships) book.relationships = [];
  if (!book.nodePositions) book.nodePositions = {};
  const canvas = document.getElementById('relCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const chars = book.characters;
  const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx,cy)-60;
  chars.forEach((c,i) => {
    if (!book.nodePositions[c.id]) {
      const angle = (2*Math.PI*i/chars.length) - Math.PI/2;
      book.nodePositions[c.id] = { x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle) };
    }
  });
  saveBooks();
  const roleColors = { protagonist:'#6a82fb',supporter:'#4ade80',villain:'#fc5c7d',elder:'#f0c27f',deity:'#c084fc',extra:'#888',mentor:'#55a3e8',lover:'#fd79a8',family:'#e17055',rival:'#fdcb6e',beast:'#00b894' };
  let selected = null, dragging = null, dblClickTimer = null;

  function drawArrow(from, to, color) {
    const angle = Math.atan2(to.y-from.y, to.x-from.x);
    const len = 10;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(to.x, to.y);
    ctx.lineTo(to.x-len*Math.cos(angle-Math.PI/6), to.y-len*Math.sin(angle-Math.PI/6));
    ctx.lineTo(to.x-len*Math.cos(angle+Math.PI/6), to.y-len*Math.sin(angle+Math.PI/6));
    ctx.closePath(); ctx.fill();
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // Draw relationships
    (book.relationships||[]).forEach(rel => {
      const f = book.nodePositions[rel.from], t = book.nodePositions[rel.to];
      if (!f || !t) return;
      const color = getRelColor(rel.type);
      const dash = getRelDash(rel.type);
      ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(t.x,t.y);
      ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.setLineDash(dash);
      ctx.stroke();
      ctx.setLineDash([]);
      // Arrowhead(s)
      drawArrow(f, t, color);
      if (rel.bidirectional) drawArrow(t, f, color);
      // Label
      const mx = (f.x+t.x)/2, my = (f.y+t.y)/2;
      ctx.fillStyle = color; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
      const label = rel.type + (rel.bidirectional ? '⇄' : '');
      ctx.fillText(label, mx, my-6);
      if (rel.description) {
        ctx.fillStyle = '#888'; ctx.font = '9px sans-serif';
        ctx.fillText(rel.description.slice(0,10), mx, my+10);
      }
    });
    // Draw nodes
    chars.forEach(c => {
      const p = book.nodePositions[c.id];
      if (!p) return;
      ctx.beginPath(); ctx.arc(p.x, p.y, selected===c.id ? 20 : 16, 0, 2*Math.PI);
      ctx.fillStyle = roleColors[c.roleId]||'#888';
      ctx.fill();
      ctx.strokeStyle = '#0d0f1a'; ctx.lineWidth = 2; ctx.stroke();
      if (selected === c.id) {
        ctx.beginPath(); ctx.arc(p.x, p.y, 22, 0, 2*Math.PI);
        ctx.strokeStyle = '#f0c27f'; ctx.lineWidth = 2; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
      }
      ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(c.display.length>8?c.display.slice(0,7)+'…':c.display, p.x, p.y-24);
    });
  }

  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const hit = chars.find(c => {
      const p = book.nodePositions[c.id];
      return p && Math.hypot(mx-p.x, my-p.y) < 20;
    });
    if (hit) {
      if (selected && hit.id !== selected.id) {
        showRelationshipModal(book, selected.id, hit.id, () => { draw(); updateRelSidebar(book); });
        selected = null;
      } else if (selected === hit.id) {
        // Clicking already-selected node: show detail
        showNodeDetail(book, hit.id);
      } else {
        selected = hit.id;
        dragging = hit.id;
        updateRelSidebar(book);
      }
      draw();
    } else { selected = null; draw(); updateRelSidebar(book); }
    if (dragging) { e.preventDefault(); }
  });
  canvas.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = canvas.getBoundingClientRect();
    const p = book.nodePositions[dragging];
    if (p) { p.x = e.clientX-rect.left; p.y = e.clientY-rect.top; draw(); }
  });
  canvas.addEventListener('mouseup', () => { if (dragging) { saveBooks(); dragging = null; } });

  function showNodeDetail(book, charId) {
    const sidebar = document.getElementById('relSidebar');
    const c = book.characters.find(ch => ch.id === charId);
    if (!c || !sidebar) return;
    const p = c.profile || {};
    const charRels = (book.relationships||[]).filter(r => r.from === charId || r.to === charId);
    sidebar.innerHTML = `<div style="font-size:0.85rem;">
      <h4 style="color:#f0c27f;margin-bottom:8px;border-bottom:1px solid #2a2d4a;padding-bottom:6px;">${c.display}</h4>
      <div style="color:#888;font-size:0.75rem;margin-bottom:10px;">${c.role} · ${c.gender} · ${c.style}</div>
      ${p.age ? `<div style="font-size:0.75rem;color:#aaa;">年龄: ${p.age}</div>` : ''}
      ${p.personality ? `<div style="font-size:0.75rem;color:#aaa;">性格: ${p.personality}</div>` : ''}
      ${p.cultivation ? `<div style="font-size:0.75rem;color:#f0c27f;">功法: ${p.cultivation}</div>` : ''}
      ${p.realm ? `<div style="font-size:0.75rem;color:#4ade80;">境界: ${p.realm}</div>` : ''}

          charRels.map(r => {
            const other = r.from === charId ? book.characters.find(ch=>ch.id===r.to) : book.characters.find(ch=>ch.id===r.from);
            return `<div style="font-size:0.7rem;color:#ccc;padding:2px 0;">${r.type} ${r.bidirectional?'⇄':'→'} ${other?other.display:'?'}</div>`;

    </div>`;

  }

  function updateRelSidebar(book) {
    const sidebar = document.getElementById('relSidebar');
    if (!sidebar) return;
    const rels = book.relationships||[];
    sidebar.innerHTML = '<h4 style="color:#ddd;margin-bottom:8px;font-size:0.85rem;">已建立关系</h4>' +
      (rels.length===0?'<p style="color:#555;font-size:0.8rem;">点击两个角色节点建立关系<br><br>选中节点后再点 → 查看详情</p>':
        rels.map(r => {
          const from = chars.find(c=>c.id===r.from), to = chars.find(c=>c.id===r.to);
          return `<div style="display:flex;align-items:center;gap:4px;padding:6px 0;border-bottom:1px solid #1a1c32;font-size:0.75rem;">
            <span style="color:#ccc;">${from?from.display:'?'}</span>
            <span style="color:${getRelColor(r.type)};" title="${r.description||''}">${r.type}${r.bidirectional?'⇄':''}</span>
            <span style="color:#ccc;">${to?to.display:'?'}</span>
            ${r.description ? `<span style="font-size:0.65rem;color:#555;">${r.description.slice(0,8)}</span>` : ''}
            <button style="margin-left:auto;background:none;border:none;color:#555;cursor:pointer;font-size:0.7rem;" data-rel="${r.from}_${r.to}">✕</button></div>`;
        }).join(''));
    sidebar.querySelectorAll('button[data-rel]').forEach(b => {
      b.addEventListener('click', () => {
        const [f,t] = b.dataset.rel.split('_');
        book.relationships = book.relationships.filter(r=>!(r.from===f&&r.to===t)&&!(r.from===t&&r.to===f));
        saveBooks(); draw(); updateRelSidebar(book);
      });
    });
  }

  // Legend
  const allTypes = [];
  for (const cat of Object.values(ALL_REL_TYPES)) {
    for (const [k,v] of Object.entries(cat.types)) { allTypes.push({ type:k, color:v.color, cat:cat.label }); }
  }
  document.getElementById('relLegend').innerHTML = [
    ...Object.entries(roleColors).map(([k,v]) => `<div class="legend-item"><div class="legend-dot" style="background:${v}"></div>${DATA.charTypes.find(c=>c.id===k)?.label||k}</div>`),
    `<div class="legend-item" style="grid-column:1/-1;font-size:0.7rem;color:#555;padding:4px 0;">— 关系类型 —</div>`,
    ...allTypes.map(t => `<div class="legend-item"><div class="legend-line" style="background:${t.color}"></div>${t.type}</div>`)
  ].join('');

  draw();
  updateRelSidebar(book);
}

function showRelationshipModal(book, fromId, toId, onSave) {
  const from = book.characters.find(c=>c.id===fromId), to = book.characters.find(c=>c.id===toId);
  if (!from || !to) return;
  const categories = Object.entries(ALL_REL_TYPES);
  let activeCat = categories[0][0];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:500px;">
      <h3>🔗 建立关系</h3>
      <div class="rel-modal-chars"><span>${from.display}</span><span class="rel-arrow">→</span><span>${to.display}</span></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;" id="relCatBtns">
        ${categories.map(([k,v]) => `<button class="filter-chip" data-cat="${k}">${v.label}</button>`).join('')}
      </div>
      <div class="rel-type-grid" id="relTypeGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;"></div>
      <div style="margin-top:10px;">
        <label style="font-size:0.75rem;color:#888;">描述（可选）</label>
        <input id="relDescription" placeholder="如：表面师徒，实为利用..." style="width:100%;background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.8rem;font-family:inherit;margin-top:4px;box-sizing:border-box;">
      </div>
      <label style="font-size:0.78rem;color:#aaa;display:flex;align-items:center;gap:6px;margin-top:8px;">
        <input type="checkbox" id="relBidirectional"> 双向关系
      </label>
      <div class="modal-actions">
        <button class="btn-cancel" id="relCancel">取消</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  function renderTypeGrid(catKey) {
    const grid = overlay.querySelector('#relTypeGrid');
    const types = ALL_REL_TYPES[catKey].types;
    grid.innerHTML = Object.entries(types).map(([k,v]) =>
      `<button class="rel-type-btn" data-type="${k}" style="border-color:${v.color}44;color:${v.color};">${k}</button>`
    ).join('');
    grid.querySelectorAll('.rel-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        book.relationships.push({
          from: fromId, to: toId, type: btn.dataset.type,
          bidirectional: overlay.querySelector('#relBidirectional').checked,
          description: overlay.querySelector('#relDescription').value.trim()
        });
        saveBooks(); overlay.remove();
        if (onSave) onSave();
        showToast('✅ 关系已建立');
      });
    });
  }

  overlay.querySelector('#relCatBtns').querySelectorAll('.filter-chip').forEach(chip => {
    if (chip.dataset.cat === activeCat) chip.classList.add('active');
    chip.addEventListener('click', () => {
      overlay.querySelectorAll('#relCatBtns .filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCat = chip.dataset.cat;
      renderTypeGrid(activeCat);
    });
  });
  overlay.querySelector('#relCancel').addEventListener('click', () => overlay.remove());
  renderTypeGrid(activeCat);
}

function generateFamilyNames(count) {
  const sn = DATA.specialNaming.familySameGen;
  const genChar = rand(sn.genChars.male);
  const results = [];
  const surnames = POOLS.cnSurnames.slice(0, 100);
  for (let i = 0; i < count; i++) {
    const surname = rand(surnames);
    const gender = Math.random() < 0.5 ? 'male' : 'female';
    const chars = gender === 'male' ? sn.genChars.male : sn.genChars.female;
    const suffix = gender === 'male' ? rand(sn.suffixMale) : rand(sn.suffixFemale);
    const secondChar = rand(chars.filter(c => c !== genChar));
    results.push({
      name: surname + genChar + secondChar,
      display: `${surname}${genChar}${secondChar}（${suffix}）`,
      gender, genChar, suffix,
      note: `同辈字"${genChar}"，${gender==='male'?'兄弟':'姐妹'}排行`
    });
  }
  return { genChar, results };
}

function generateCoupleNames(count) {
  const sn = DATA.specialNaming.coupleNames;
  const pair = rand(sn.pairs);
  const results = [];
  const surnames = POOLS.cnSurnames.slice(0, 100);
  for (let i = 0; i < count; i++) {
    const s1 = rand(surnames), s2 = rand(surnames.filter(s => s !== s1));
    const extra = ['辰','轩','宇','瑶','萱','晚','曦','逸','然','安','宁','清'][Math.floor(Math.random()*12)];
    results.push({
      male: s1 + pair[0] + extra,
      female: s2 + pair[1] + extra,
      display: `${s1}${pair[0]}${extra} ♥ ${s2}${pair[1]}${extra}`,
      pair: pair.join('/'),
      note: `对偶名"${pair[0]}/${pair[1]}"，寓意${pair[0]==='龙'?'尊贵':pair[0]==='日'?'光明':pair[0]==='琴'?'和谐':'相应'}成双`
    });
  }
  return { pair, results };
}

function generateSectNames(count, style) {
  const sn = DATA.specialNaming.sectSamePrefix;
  const prefixes = sn[style] || sn.xianxia;
  const prefix = rand(prefixes);
  const results = [];
  const titles = style === 'xianxia' ? ['真人','道人','仙子','尊者','散人'] :
                 style === 'wuxia' ? ['大侠','剑客','刀客','女侠','侠客'] :
                 style === 'ancient' ? ['先生','道人','散人','居士','仙姑'] :
                 ['骑士','法师','游侠','贤者','猎手'];
  for (let i = 0; i < count; i++) {
    const title = rand(titles);
    const suffix = style === 'xianxia' ? rand(['子','君','仙','尘','云','风','月','星']) :
                   style === 'wuxia' ? rand(['风','云','影','行','远','飞','寒','羽']) :
                   style === 'ancient' ? rand(['之','子','中','和','明','清','玄','真']) :
                   rand(['尔','斯','恩','特','林','德','亚','娜']);
    results.push({
      name: prefix + suffix,
      display: `${prefix}${suffix}（${title}）`,
      prefix, title,
      note: `同门前缀"${prefix}"，${title}称号`
    });
  }
  return { prefix, results };
}

function generateRegionalNames(count, regionKey) {
  const sn = DATA.specialNaming.regionalStyle;
  const region = sn.regions[regionKey] || sn.regions.jiangnan;
  const results = [];
  for (let i = 0; i < count; i++) {
    const surname = rand(region.surnames);
    const gender = Math.random() < 0.5 ? 'male' : 'female';
    const chars = gender === 'male' ? region.maleC : region.femaleC;
    const flavor = rand(region.flavor);
    const c1 = rand(chars), c2 = rand(chars.filter(c => c !== c1));
    results.push({
      name: surname + c1 + c2,
      display: `${surname}${c1}${c2}（${region.label}）`,
      gender, region: region.label,
      note: `${region.desc}，"${flavor}"之意蕴`
    });
  }
  return { region: region.label, results };
}

async function generateAIRelationshipNames(mode, config) {
  if (!aiConfig?.apiKey) throw new Error('请先配置 AI');
  let prompt = '';
  switch (mode) {
    case 'family':
      prompt = `为小说家族${config.genChar ? '以"'+config.genChar+'"为字辈' : ''}生成${config.count||5}个兄弟姐妹名字（含姓氏），每个名字附简短寓意。性别比例约1:1。返回JSON格式：[{"name":"...","meaning":"..."}]。`;
      break;
    case 'couple':
      prompt = `生成${config.count||3}对小说情侣配对名字（含姓氏），每对名字需有对应/互补关系。返回JSON格式：[{"male":"...","female":"...","pairMeaning":"..."}]。`;
      break;
    case 'sect':
      prompt = `为${config.style||'仙侠'}小说的一个宗门/组织生成${config.count||5}个同门成员名字（含道号/前缀），风格需统一。返回JSON格式：[{"name":"...","prefix":"...","meaning":"..."}]。`;
      break;
    case 'regional':
      prompt = `生成${config.count||5}个具有${config.region||'江南'}地域特色的角色名字（含姓氏），名字需体现该地域文化特色。返回JSON格式：[{"name":"...","gender":"male/female","meaning":"..."}]。`;
      break;
  }
  const response = await fetch(`${aiConfig.baseUrl}/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiConfig.apiKey}` },
    body: JSON.stringify({ model: aiConfig.model, messages: [{ role: 'user', content: prompt }], temperature: 0.9, max_tokens: 1500 }),
  });
  if (!response.ok) throw new Error(`API 错误: ${response.status}`);
  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  const jsonMatch = text.match(/\[[\s\S]*\]/);
  if (!jsonMatch) throw new Error('AI 返回格式异常');
  return JSON.parse(jsonMatch[0]);
}

function renderPlot() {
  const area = document.getElementById('plotContent');
  if (!books.length || books.every(b => b.characters.length < 2)) {
    area.innerHTML = '<div class="empty-state"><div class="icon">⚡</div><p>需要至少一个书册且有 2+ 个角色才能生成剧情</p></div>';
    return;
  }
  const validBooks = books.filter(b => b.characters.length >= 2);
  const allTypes = [];
  for (const [catKey, cat] of Object.entries(PLOT_CATEGORIES)) {
    for (const [typeKey, type] of Object.entries(cat.types)) {
      allTypes.push({ catKey, catLabel: cat.label, typeKey, ...type });
    }
  }
  area.innerHTML = `<div class="back-bar"><label for="plotBookSelect" style="color:#aaa;font-size:0.85rem;">选择书册：</label>
    <select id="plotBookSelect" style="background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.85rem;font-family:inherit;">
      ${validBooks.map(b => `<option value="${b.id}">${b.title} (${b.characters.length}个角色)</option>`).join('')}
    </select></div>
    <div style="background:#1a1c32;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #2a2d4a;">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div style="flex:1;min-width:130px;"><label style="font-size:0.8rem;color:#888;display:block;margin-bottom:4px;">角色 A</label><select id="plotCharA" style="width:100%;background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.85rem;font-family:inherit;"></select></div>
        <div style="flex:1;min-width:130px;"><label style="font-size:0.8rem;color:#888;display:block;margin-bottom:4px;">角色 B</label><select id="plotCharB" style="width:100%;background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.85rem;font-family:inherit;"></select></div>
        <div style="flex:1;min-width:130px;"><label style="font-size:0.8rem;color:#888;display:block;margin-bottom:4px;">角色 C (可选)</label><select id="plotCharC" style="width:100%;background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.85rem;font-family:inherit;"><option value="">不使用</option></select></div>
        <div style="flex:2;min-width:200px;">
          <label style="font-size:0.8rem;color:#888;display:block;margin-bottom:4px;">剧情类型</label>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;" id="plotCatBtns">
            ${Object.entries(PLOT_CATEGORIES).map(([k,v]) => `<button class="filter-chip" data-cat="${k}">${v.icon} ${v.label}</button>`).join('')}
          </div>
          <select id="plotConflictType" style="width:100%;background:#0d0f1a;border:1px solid #2a2d4a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.85rem;font-family:inherit;"></select>
        </div>
        <div><button class="btn-gen" id="genPlotBtn" style="white-space:nowrap;">⚡ 生成剧情</button></div>
      </div>
    </div>
    <div id="plotOutput"></div>`;
  updatePlotCharSelects();
  area.querySelector('#plotBookSelect').addEventListener('change', updatePlotCharSelects);
  area.querySelector('#genPlotBtn').addEventListener('click', generatePlotConflict);

  // Category filtering
  function populateTypeSelect(catKey) {
    const sel = area.querySelector('#plotConflictType');
    if (!sel) return;
    const cat = PLOT_CATEGORIES[catKey];
    sel.innerHTML = Object.entries(cat.types).map(([k,v]) => `<option value="${catKey}:${k}">${v.icon} ${v.name}</option>`).join('');
  }
  const catBtns = area.querySelector('#plotCatBtns').querySelectorAll('.filter-chip');
  catBtns[0]?.classList.add('active');
  populateTypeSelect(Object.keys(PLOT_CATEGORIES)[0]);
  catBtns.forEach(chip => {
    chip.addEventListener('click', () => {
      catBtns.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      populateTypeSelect(chip.dataset.cat);
    });
  });
}

function updatePlotCharSelects() {
  const bookId = document.querySelector('#plotBookSelect')?.value;
  if (!bookId) return;
  const book = getBook(bookId);
  if (!book) return;
  const opts = book.characters.map(c => `<option value="${c.id}">${c.display} (${c.role})</option>`).join('');
  ['A','B','C'].forEach(l => {
    const sel = document.querySelector('#plotChar'+l);
    if (sel) {
      const val = sel.value;
      sel.innerHTML = (l==='C'?'<option value="">不使用</option>':'') + opts;
      if (val && book.characters.find(c=>c.id===val)) sel.value = val;
    }
  });
}

function generatePlotConflict() {
  const bookId = document.querySelector('#plotBookSelect')?.value;
  const book = getBook(bookId);
  if (!book) return;
  const a = book.characters.find(c=>c.id===document.querySelector('#plotCharA')?.value);
  const b = book.characters.find(c=>c.id===document.querySelector('#plotCharB')?.value);
  const c = book.characters.find(c=>c.id===document.querySelector('#plotCharC')?.value);
  const fullType = document.querySelector('#plotConflictType')?.value || 'character:emotional';
  const [catKey, typeKey] = fullType.split(':');
  if (!a || !b) { showToast('请选择至少两个角色'); return; }

  const cat = PLOT_CATEGORIES[catKey];
  const info = cat?.types[typeKey];
  if (!info) return;

  const chars = [a,b]; if (c) chars.push(c);

  // Character-aware intro
  const charIntro = chars.map(ch => {
    const p = ch.profile || {};
    const traits = [];
    if (p.personality) traits.push(p.personality);
    if (p.realm) traits.push(p.realm);
    if (p.cultivation) traits.push(p.cultivation);
    if (p.ability && !traits.includes(p.ability)) traits.push(p.ability);
    return `**${ch.display}**（${ch.role}${traits.length ? '，'+traits.slice(0,3).join('，') : ''}）`;
  }).join('\n');

  // Weave cultivation/realm into battle/strategy contexts
  let cultivationFlavor = '';
  const aCult = a.profile?.cultivation || a.profile?.realm;
  const bCult = b.profile?.cultivation || b.profile?.realm;
  if ((catKey === 'action') && (aCult || bCult)) {
    cultivationFlavor = aCult && bCult
      ? `\n\n${a.display}的**${aCult}**与${b.display}的**${bCult}**在虚空中激烈碰撞，两股截然不同的力量相互撕扯，让天地为之变色。`
      : (aCult ? `\n\n${a.display}运转**${aCult}**，磅礴的力量在这一刻毫无保留地释放。` : `\n\n${b.display}催动**${bCult}**，战局在这一刻发生了微妙的变化。`);
  }

  const cause = rand(info.causes);
  const escalate = rand(info.escalations);
  const climax = rand(info.climaxes);
  const ending1 = rand(info.endings);
  const ending2 = rand(info.endings.filter(e => e !== ending1));

  const introFlavor = chars.length > 2 ? `\n\n${chars[2].display}的介入让局面变得更加错综复杂。` : '';
  const escalateFlavor = rand(['在这场争斗中，没有无辜者——每个人都在为了自己的理由而战。','昔日的羁绊在这一刻被撕裂，裂痕深可见骨。','每一次交锋都在彼此的心中刻下更深的伤痕，也在旁观者的记忆中留下难以磨灭的印记。']);

  const output = `
#### 🎬 ${info.icon} 冲突起因
${cause}。${introFlavor}

${charIntro}${cultivationFlavor}

#### 📈 冲突升级
${escalate}。${escalateFlavor}

#### ⚔️ 高潮
${climax}

#### 🌅 可能结局
- **${ending1.split('：')[0]}**：${ending1.split('：').slice(1).join('：')}
- **${ending2.split('：')[0]}**：${ending2.split('：').slice(1).join('：')}
- **开放结局**：故事在这里戛然而止——剩下的，留给你和你的读者去想象。

> ⚡ *此剧情由模拟器自动生成。好故事的灵魂，在于你赋予角色的温度与呼吸。*
`;

  document.getElementById('plotOutput').innerHTML = `<div class="conflict-output">${output.replace(/\n/g,'<br>')}</div>
    <div style="margin-top:12px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
      <button class="btn-gen ghost small" id="regenCauseBtn">🔄 起因</button>
      <button class="btn-gen ghost small" id="regenEscalateBtn">🔄 升级</button>
      <button class="btn-gen ghost small" id="regenClimaxBtn">🔄 高潮</button>
      <button class="btn-gen ghost small" id="regenEndingsBtn">🔄 结局</button>
      <button class="btn-gen ghost" id="copyPlotBtn">📋 复制</button>
      <button class="btn-gen" id="regenPlotBtn">🔄 全部重生成</button>
    </div>`;
  document.getElementById('copyPlotBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(output.replace(/<br>/g,'\n').replace(/\*\*/g,'').replace(/\*/g,''));
    showToast('✅ 已复制');
  });
  document.getElementById('regenPlotBtn').addEventListener('click', generatePlotConflict);
  // Section-level regenerate
  document.getElementById('regenCauseBtn').addEventListener('click', () => {
    const newCause = rand(info.causes);
    const el = document.querySelector('.conflict-output');
    if (el) el.innerHTML = el.innerHTML.replace(/🎬.*?(?=<br>)/s, '🎬 '+info.icon+' 冲突起因<br>'+newCause);
    showToast('起因已刷新');
  });
  document.getElementById('regenEscalateBtn').addEventListener('click', () => {
    const el = document.querySelector('.conflict-output');
    if (el) {
      const es = rand(info.escalations);
      const fl = rand(['在这场争斗中，没有无辜者。','昔日的羁绊在这一刻被撕裂。','每一次交锋都在彼此的心中刻下伤痕。']);
      el.innerHTML = el.innerHTML.replace(/📈.*?(?=<br>)/s, '📈 冲突升级<br>'+es+'。'+fl);
    }
    showToast('升级已刷新');
  });
  document.getElementById('regenClimaxBtn').addEventListener('click', () => {
    const el = document.querySelector('.conflict-output');
    if (el) el.innerHTML = el.innerHTML.replace(/⚔️.*?(?=<br>)/s, '⚔️ 高潮<br>'+rand(info.climaxes));
    showToast('高潮已刷新');
  });
  document.getElementById('regenEndingsBtn').addEventListener('click', () => {
    const e1 = rand(info.endings), e2 = rand(info.endings.filter(e => e !== e1));
    const newEnd = `- **${e1.split('：')[0]}**：${e1.split('：').slice(1).join('：')}<br>- **${e2.split('：')[0]}**：${e2.split('：').slice(1).join('：')}<br>- **开放结局**：故事在这里戛然而止——剩下的，留给你和你的读者去想象。`;
    const el = document.querySelector('.conflict-output');
    if (el) el.innerHTML = el.innerHTML.replace(/🌅.*$/s, '🌅 可能结局<br>'+newEnd);
    showToast('结局已刷新');
  });
}

// ==================== TOAST ====================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function exportSelectedCSV() {
  const cards = document.querySelectorAll('.name-card.batch-selected');

  const resultNames = window._lastGeneratedNames || [];
  cards.forEach(card => {
    const idx = parseInt(card.querySelector('.batch-check')?.dataset.index);
    if (idx >= 0 && resultNames[idx]) {
      const n = resultNames[idx];
      csv += `"${n.display}","${n.role}","${n.gender}","${n.style}","${n.zi||''}","${n.hao||''}","${n.nickname||''}","${n.wuxing||''}","${n.pingze||''}"\n`;
    }
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='角色名字.csv'; a.click(); URL.revokeObjectURL(url);
  showToast('✅ CSV 已导出');
}

const THEME_KEY = 'app_theme';
const THEMES = ['dark', 'classical', 'xianxia', 'forest'];
const THEME_ICONS = { dark:'🌙', classical:'📜', xianxia:'✨', forest:'🌿' };

function initTheme() {
  const saved = localStorage.getItem(THEME_KEY) || 'dark';
  applyTheme(saved);
  document.getElementById('themeBtn').addEventListener('click', cycleTheme);
}

function applyTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.getElementById('themeBtn').textContent = THEME_ICONS[name] || '🎨';
  localStorage.setItem(THEME_KEY, name);
}

function cycleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const idx = THEMES.indexOf(cur);
  const next = THEMES[(idx + 1) % THEMES.length];
  applyTheme(next);
}

1. 名字必须符合所选风格背景（${style.label}）
2. 每个名字必须返回 name（名字）、meaning（名字含义，50字以内）、fitReason（为什么适合这个角色，50字以内）
3. 名字要有文学性和创意，避免俗套
4. 严格返回 JSON 数组格式`;

  const url = aiConfig.baseUrl.replace(/\/+$/, '') + '/chat/completions';
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + aiConfig.apiKey },
    body: JSON.stringify({
      model: aiConfig.model,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt }
      ],
      temperature: 0.9,
      max_tokens: 2000
    }),
    signal: AbortSignal.timeout(15000)
  });

  if (!resp.ok) {
    const errText = await resp.text();
    if (resp.status === 401) throw new Error('API Key 无效，请检查设置');
    if (resp.status === 402 || resp.status === 429) throw new Error('API 额度不足或请求过于频繁');
    throw new Error('API 请求失败: ' + resp.status + ' ' + errText.slice(0, 100));
  }

  const data = await resp.json();
  const content = data.choices[0].message.content;
  let jsonStr = content.trim();
  jsonStr = jsonStr.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/, '');
  const names = JSON.parse(jsonStr);
  if (!Array.isArray(names)) throw new Error('AI 返回格式异常');
  return names.map(n => ({ ...n, fromAI: true }));
}

// ==================== SKELETON & HELPERS ====================
function showSkeleton(targetId) {
  document.getElementById(targetId).innerHTML = '<div class="skeleton-grid">' + Array(6).fill('<div class="skeleton-card"></div>').join('') + '</div>';
}

function showError(targetId, msg, onRetry) {
  const area = document.getElementById(targetId);
  area.innerHTML = '<div class="retry-banner"><p>❌ ' + msg + '</p>' + (onRetry ? '<button class="btn-gen ghost small" onclick="(' + onRetry.toString() + ')()">🔄 重试</button>' : '') + '</div>';
}

function getCurrentParams() {
  return {
    roleId: document.querySelector('#roleTypeBtns .active')?.dataset?.value || 'protagonist',
    styleId: document.querySelector('#styleBtns .active')?.dataset?.value || 'urban',
    genderId: document.querySelector('#genderBtns .active')?.dataset?.value || 'male',
    count: parseInt(document.getElementById('countSelect').value),
    inclTitle: document.getElementById('includeTitle').checked
  };
}

// ==================== OVERRIDE generate() FOR AI ====================
const _originalGenerate = generate;

generate = async function() {
  const params = getCurrentParams();
  const desc = document.getElementById('descInput')?.value?.trim() || '';

  document.getElementById('selectionDisplay').textContent =
    (DATA.charTypes.find(c => c.id === params.roleId)?.label || '') + ' · ' +
    (DATA.genders.find(g => g.id === params.genderId)?.label || '') + ' · ' +
    (DATA.styles.find(s => s.id === params.styleId)?.label || '');

  // AI batch mode
  if (isBatchAIMode()) { await generateAIWithBatch(params); return; }

  // AI mode with description
  if (desc && aiConfig && aiConfig.apiKey) { await generateWithAI(params, desc); return; }

  // No AI key but has description
  if (desc && (!aiConfig || !aiConfig.apiKey)) { showToast('⚠️ 请先配置 AI API Key（点击右上角⚙️）'); }

  // Local mode
  _originalGenerate();
};

async function generateWithAI(params, desc) {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '🤖 AI 构思中...';
  showSkeleton('resultArea');
  try {
    const aiNames = await generateAINames(desc, params.styleId, params.genderId, params.roleId, params.count);
    const role = DATA.charTypes.find(c => c.id === params.roleId);
    const style = DATA.styles.find(s => s.id === params.styleId);
    const gender = DATA.genders.find(g => g.id === params.genderId);
    const names = aiNames.map(n => {
      const rawName = n.name;
      const zi = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(params.styleId) ? generateZi(rawName, params.genderId) : '';
      const hao = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(params.styleId) ? generateHao(params.styleId) : '';
      const nickname = generateNickname(params.styleId);
      const wuxing = detectWuxing([...rawName]);
      const pingze = detectPingZe(rawName);
      const title = params.inclTitle ? getTitle(params.roleId, params.styleId, params.genderId) : '';
      const display = title ? title + ' ' + rawName : rawName;
      n.display=display; n.rawName=rawName; n.title=title;
      n.role=role.label; n.roleId=params.roleId;
      n.style=style.label; n.styleId=params.styleId;
      n.gender=gender.label; n.genderId=params.genderId;
      n.zi=zi; n.hao=hao; n.nickname=nickname; n.wuxing=wuxing; n.pingze=pingze;
      return n;
    });
    window._lastGeneratedNames = names;
    renderAIResults(names);
    showToast('✅ AI 已生成 ' + names.length + ' 个名字');
  } catch (err) {
    showError('resultArea', err.message, () => generateWithAI(params, desc));
    showToast('❌ ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '生成名字';
  }
}

async function generateAIWithBatch(params) {
  const entries = document.querySelectorAll('.batch-ai-entry textarea');
  const batchDescs = [];
  entries.forEach((ta, i) => {
    const text = ta.value.trim();
    if (text) batchDescs.push({ index: i, text: text, label: ta.parentElement.querySelector('.batch-ai-label')?.textContent || ('角色' + (i + 1)) });
  });

  if (!batchDescs.length) { showToast('请在批量模式中至少填写一个角色描述'); return; }
  if (!aiConfig || !aiConfig.apiKey) { showToast('⚠️ 批量模式需要配置 AI API Key'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '🤖 AI 批量构思中...';
  showSkeleton('resultArea');

  try {
    const results = await generateBatchAINames(batchDescs, params.styleId, params.genderId, params.roleId);
    const role = DATA.charTypes.find(c => c.id === params.roleId);
    const style = DATA.styles.find(s => s.id === params.styleId);
    const gender = DATA.genders.find(g => g.id === params.genderId);

    const area = document.getElementById('resultArea');
    area.innerHTML = '';
    results.forEach(group => {
      const descEntry = batchDescs.find(d => d.index === group.roleIndex);
      const groupDiv = document.createElement('div');
      groupDiv.className = 'result-group';
      groupDiv.innerHTML = '<div class="result-group-title">📌 ' + (descEntry?.label || ('角色' + (group.roleIndex + 1))) + '</div>';
      const listDiv = document.createElement('div');
      listDiv.className = 'name-list';
      (group.names || []).forEach(n => {
        const rawName = n.name;
        const zi = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(params.styleId) ? generateZi(rawName, params.genderId) : '';
        const hao = ['urban','ancient','wuxia','xianxia','republic','mystery'].includes(params.styleId) ? generateHao(params.styleId) : '';
        const nickname = generateNickname(params.styleId);
        const wuxing = detectWuxing([...rawName]);
        const pingze = detectPingZe(rawName);
        const title = params.inclTitle ? getTitle(params.roleId, params.styleId, params.genderId) : '';
        const display = title ? title + ' ' + rawName : rawName;
        const enriched = { ...n, display, rawName, title, role: role.label, roleId: params.roleId, style: style.label, styleId: params.styleId, gender: gender.label, genderId: params.genderId, zi, hao, nickname, wuxing, pingze, fromAI: true };
        const card = document.createElement('div');
        card.innerHTML = formatAICard(enriched);
        card.querySelectorAll('.name-card').forEach(c => { attachAICardEvents(c, enriched); listDiv.appendChild(c); });
      });
      groupDiv.appendChild(listDiv);
      area.appendChild(groupDiv);
    });
    showToast('✅ 批量生成完成');
  } catch (err) {
    showError('resultArea', err.message, () => generateAIWithBatch(params));
    showToast('❌ ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '生成名字';
  }
}

function formatAICard(n) {
  const aiTag = n.fromAI ? '<span class="ai-badge">🤖AI</span>' : '';
  const extrasHTML = (n.zi || n.hao || n.nickname) ? `<div style="font-size:0.73rem;color:#999;margin-top:4px;">${n.zi?'<span style="color:#aaa;">字:</span> '+n.zi+' ':''}${n.hao?'<span style="color:#aaa;">号:</span> '+n.hao+' ':''}${n.nickname?'<span style="color:#888;">绰号: '+n.nickname+'</span> ':''}<span style="color:#888;">[五行:${n.wuxing||'?'}]</span> <span style="color:#888;">[${n.pingze||'?'}]</span></div>` : '';
  return `<div class="name-card" data-raw="${(n.display||'').replace(/"/g, '&quot;')}">
    <div class="name">${n.display||n.name}${aiTag}</div>
    ${n.meaning ? '<div class="desc" style="color:#ccc;margin-top:4px;">' + n.meaning + '</div>' : ''}
    ${n.fitReason ? '<div class="desc" style="color:#888;font-size:0.75rem;">💡 ' + n.fitReason + '</div>' : ''}
    <div class="desc" style="font-size:0.7rem;color:#555;">${n.role||''} · ${n.gender||''} · ${n.style||''}</div>
    ${extrasHTML}
    <div class="card-actions">
      <button class="btn-sm copy-btn">📋 复制</button>
      <button class="btn-sm highlight save-btn">💾 保存</button>
      ${n.fromAI ? '<button class="btn-deep deep-btn">🔍 AI深度</button>' : ''}
    </div>
    ${n.fromAI ? '<div class="deep-explain-box"></div>' : ''}
  </div>`;
}

function attachAICardEvents(card, nameObj) {
  card.querySelector('.copy-btn')?.addEventListener('click', (e) => {
    e.stopPropagation();
    const raw = card.dataset.raw || nameObj.name || nameObj.display || '';
    navigator.clipboard.writeText(raw).then(() => showToast('✅ 已复制')).catch(() => showToast('复制失败'));
  });
  card.querySelector('.save-btn')?.addEventListener('click', (e) => {
    e.stopPropagation();
    const entry = {
      display: nameObj.display||nameObj.name, rawName: nameObj.rawName||nameObj.name,
      title: nameObj.title||'', style: nameObj.style||'', styleId: nameObj.styleId||'urban',
      role: nameObj.role||'', roleId: nameObj.roleId||'protagonist',
      gender: nameObj.gender||'', genderId: nameObj.genderId||'male',
      zi: nameObj.zi||'', hao: nameObj.hao||'', nickname: nameObj.nickname||'',
      wuxing: nameObj.wuxing||'', pingze: nameObj.pingze||'',
    };
    saveNameToLibrary(entry, card);
  });
  card.querySelector('.deep-btn')?.addEventListener('click', async (e) => {
    e.stopPropagation();
    const box = card.querySelector('.deep-explain-box');
    if (box.classList.contains('visible')) { box.classList.remove('visible'); return; }
    box.classList.add('visible');
    box.innerHTML = '<div style="color:#888;text-align:center;padding:10px;">🤔 AI 分析中...</div>';
    try {
      const params = getCurrentParams();
      const result = await getDeepExplanation(nameObj.name || nameObj.display, params.styleId, params.roleId, params.genderId);
      let html = '';
      if (result.charAnalysis) {
        html += '<div class="deep-section"><div class="deep-label">字义拆解</div>';
        result.charAnalysis.forEach(c => { html += c.char + '：' + c.meaning + ' &nbsp; '; });
        html += '</div>';
      }
      if (result.wuxing) html += '<div class="deep-section"><div class="deep-label">五行属性</div>' + result.wuxing + '</div>';
      if (result.tonal) html += '<div class="deep-section"><div class="deep-label">音律评价</div>' + result.tonal + '</div>';
      if (result.roleFit) html += '<div class="deep-section"><div class="deep-label">角色适用</div>' + result.roleFit + '</div>';
      if (result.similar && result.similar.length) html += '<div class="deep-section"><div class="deep-label">相似推荐</div>' + result.similar.join('、') + '</div>';
      box.innerHTML = html || '暂无解读结果';
    } catch (err) {
      box.innerHTML = '<div style="color:#fc5c7d;">❌ ' + err.message + '</div>';
    }
  });
}

function renderAIResults(names) {
  const area = document.getElementById('resultArea');
  const list = document.createElement('div');
  list.className = 'name-list';
  names.forEach(n => {
    const card = document.createElement('div');
    card.innerHTML = formatAICard(n);
    card.querySelectorAll('.name-card').forEach(c => {
      attachAICardEvents(c, n);
      list.appendChild(c);
    });
  });
  area.innerHTML = '';
  area.appendChild(list);
}

function initBatchAIMode() {
  const toggle = document.getElementById('batchAIToggle');
  const entries = document.getElementById('batchAIEntries');
  const addBtn = document.getElementById('batchAIAddBtn');
  const descInput = document.getElementById('descInput');

  toggle.addEventListener('click', () => {

    entry.innerHTML = '<span class="batch-ai-label">角色' + count + '</span><textarea placeholder="描述第' + count + '个角色..."></textarea>';

    entry.querySelector('textarea').focus();

// ==================== SCROLL ANIMATION HERO (ContainerScroll replica) ====================
function initScrollAnimation() {
  const hero = document.getElementById('scrollHero');
  const header = document.getElementById('scrollHeroHeader');
  const card = document.getElementById('scrollCard');

  function update() {
    const rect = hero.getBoundingClientRect();
    const progress = Math.max(0, Math.min(1, (window.innerHeight - rect.top) / (rect.height - window.innerHeight)));
    const isMobile = window.innerWidth <= 768;

    // Rotate X: 20deg → 0
    const rotateX = 20 - progress * 20;
    // Scale: 1.05 → 1 (desktop), 0.7 → 0.9 (mobile)
    const scaleStart = isMobile ? 0.7 : 1.05;
    const scaleEnd = isMobile ? 0.9 : 1;
    const scale = scaleStart + (scaleEnd - scaleStart) * progress;
    // Translate Y: header moves up by 100px
    const translateY = -progress * 80;

    card.style.transform = `rotateX(${rotateX}deg) scale(${scale})`;
    header.style.transform = `translateY(${translateY}px)`;
  }

  window.addEventListener('scroll', update, { passive: true });
  window.addEventListener('resize', update);
  update();
}
